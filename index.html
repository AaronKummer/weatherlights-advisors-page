<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="/logo.jpg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="WeatherLight Advisors — AWS certification training, cloud infrastructure setup, and AI-tooling readiness for teams that want to move fast on AWS." />
  <title>WeatherLight Advisors — AWS Certification, Infrastructure & AI Readiness</title>
</head>

<body>
  <div id="app"></div>
  <script>
  // Guard: if this SPA loaded inside an iframe for a tool path
  // (Amplify's SPA rewrite serving index.html instead of the static file),
  // don't mount Vue — it causes infinite nesting.
  if (window.self !== window.top) {
    var tp = ['/quiz/','/wargame/','/flashcards/','/lessons/','/training-ground/'];
    for (var i = 0; i < tp.length; i++) {
      if (location.pathname.indexOf(tp[i]) === 0) {
        document.getElementById('app').remove();
        throw new Error('Blocked SPA in iframe');
      }
    }
  }
  </script>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
