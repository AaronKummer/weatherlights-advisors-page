<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WARGAME — Violet Vector</title>
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#00ff88">
<meta name="color-scheme" content="dark">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --accent:#00eeff;
  --accent-dim:#00eeff44;
  --accent-bright:#44ffff;
  --secondary:#ff44aa;
  --secondary-dim:#ff44aa44;
  --bg:#0a0a0a;
  --bg-panel:#050505;
  --bg-card:#111118;
  --text:#00ff88;
  --text-dim:#446644;
  --success:#00ff88;
  --error:#ff4444;
  --warn:#ffaa00;
  --border:#00ff8833;
  --glow:#00ff88;
  --term-green:#00ff88;
  --term-bg:#0a0a0a;
  --term-border:#00ff8833;
  --term-green-bright:#00ff88cc;
  --term-green-dim:#00ff8844;
  --term-green-glow:#00ff8866;
  --term-green-subtle:#00ff8822;
  --term-green-faint:#00ff8811;
  --term-green-mid:#00ff8888;
  --term-green-muted:#00ff8899;
  --term-dim-text:#33553388;
  --term-progress-dark:#00cc66;
  --xp-color:#ff44aa;
  --xp-glow:#ff44aa66;
  --timer-color:#ffaa00;
  --overlay-bg:rgba(0,0,0,0.85);
  --scanline-opacity:0.6;
  --crt-glow-inner:rgba(0,255,136,0.03);
  --crt-glow-outer:rgba(0,255,136,0.05);
  --flash-glow:rgba(0,255,136,0.3);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:var(--term-bg);color:var(--term-green);font-family:'JetBrains Mono',monospace;font-size:14px;line-height:1.5}
::selection{background:var(--term-green);color:var(--term-bg)}
.scanlines{pointer-events:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:9999;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.08) 2px,rgba(0,0,0,0.08) 4px);
  animation:scanflicker 8s linear infinite}
@keyframes scanflicker{0%,100%{opacity:var(--scanline-opacity)}50%{opacity:calc(var(--scanline-opacity) - 0.2)}}
.crt-container{position:relative;width:100%;height:100%;display:flex;flex-direction:column;
  border-radius:12px;overflow:hidden;
  box-shadow:inset 0 0 80px var(--crt-glow-inner),0 0 40px var(--crt-glow-outer)}
.top-bar{display:flex;align-items:center;gap:12px;padding:8px 16px;background:var(--bg-panel);border-bottom:1px solid var(--term-border);
  font-size:11px;letter-spacing:1px;flex-shrink:0;z-index:10;flex-wrap:wrap}
.top-bar .logo{color:var(--term-green);font-weight:700;font-size:13px;text-shadow:0 0 10px var(--term-green-glow)}
.top-bar .sep{color:var(--term-green-dim)}
.top-bar .level-info{color:var(--term-green-bright)}
.progress-bar{flex:0 0 120px;height:6px;background:var(--bg-card);border-radius:3px;overflow:hidden;box-shadow:0 0 6px var(--term-green-subtle)}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--term-green),var(--term-progress-dark));transition:width .5s;box-shadow:0 0 10px var(--term-green)}
.top-bar .timer{color:var(--timer-color);font-size:11px}
.top-bar .xp{color:var(--xp-color);font-size:11px;text-shadow:0 0 8px var(--xp-glow)}
.top-bar .rank{color:var(--accent);font-size:10px;letter-spacing:2px}
.top-bar .sound-btn{background:none;border:1px solid var(--term-green-dim);color:var(--term-green);font-family:inherit;font-size:10px;padding:2px 8px;cursor:pointer;border-radius:3px}
.top-bar .sound-btn:hover{background:var(--term-green-subtle)}
.terminal{flex:1;overflow-y:auto;padding:12px 16px;padding-bottom:60px;scroll-behavior:smooth}
.terminal::-webkit-scrollbar{width:6px}
.terminal::-webkit-scrollbar-track{background:var(--bg-panel)}
.terminal::-webkit-scrollbar-thumb{background:var(--term-green-dim);border-radius:3px}
.terminal .line{white-space:pre-wrap;word-break:break-all}
.terminal .line.error{color:var(--error)}
.terminal .line.success{color:var(--term-green);text-shadow:0 0 8px var(--term-green-glow)}
.terminal .line.info{color:var(--accent)}
.terminal .line.warn{color:var(--warn)}
.terminal .line.dim{color:var(--text-dim)}
.terminal .line.pink{color:var(--xp-color)}
.terminal .line.bold{font-weight:700}
.input-area{display:flex;align-items:center;padding:8px 16px;background:var(--bg-panel);border-top:1px solid var(--term-border);flex-shrink:0}
.prompt-text{color:var(--term-green-bright);white-space:nowrap;margin-right:8px;font-size:13px}
.cmd-input{flex:1;background:transparent;border:none;color:var(--term-green);font-family:inherit;font-size:14px;outline:none;caret-color:var(--term-green)}
.cmd-input::placeholder{color:var(--term-green-dim)}
.bottom-bar{display:flex;gap:8px;padding:6px 16px;background:var(--bg-panel);border-top:1px solid var(--term-green-subtle);flex-shrink:0}
.bottom-bar button{background:none;border:1px solid var(--term-border);color:var(--term-green-muted);font-family:inherit;font-size:10px;padding:4px 12px;cursor:pointer;letter-spacing:1px;border-radius:2px;transition:all .2s}
.bottom-bar button:hover{background:var(--term-green-subtle);color:var(--term-green);border-color:var(--term-green)}
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:var(--overlay-bg);z-index:100;justify-content:center;align-items:center}
.modal-overlay.open{display:flex}
.modal{background:var(--term-bg);border:1px solid var(--term-green-dim);border-radius:8px;padding:24px;max-width:500px;width:90%;max-height:80vh;overflow-y:auto;box-shadow:0 0 40px var(--term-green-subtle)}
.modal h2{color:var(--term-green);font-size:14px;letter-spacing:2px;margin-bottom:16px;text-shadow:0 0 10px var(--term-green-dim)}
.modal .close-btn{float:right;background:none;border:none;color:var(--error);font-size:18px;cursor:pointer;font-family:inherit}
.modal .ach-item{padding:6px 0;border-bottom:1px solid var(--term-green-faint);font-size:11px;display:flex;gap:8px;align-items:center}
.modal .ach-item.locked{color:var(--term-dim-text)}
.modal .ach-item.unlocked{color:var(--term-green)}
.modal .stat-row{display:flex;justify-content:space-between;padding:4px 0;font-size:11px;border-bottom:1px solid var(--term-green-faint)}
.modal .stat-label{color:var(--term-green-mid)}
.modal .stat-val{color:var(--accent)}
@keyframes glitch{0%{transform:translate(0)}20%{transform:translate(-2px,1px)}40%{transform:translate(2px,-1px)}60%{transform:translate(-1px,2px)}80%{transform:translate(1px,-2px)}100%{transform:translate(0)}}
.glitch{animation:glitch .3s ease-in-out}
@keyframes flashGreen{0%{box-shadow:inset 0 0 100px var(--flash-glow)}100%{box-shadow:none}}
.level-complete-flash{animation:flashGreen .8s ease-out}
@media(max-width:600px){
  .top-bar{font-size:9px;gap:6px;padding:6px 10px}
  .progress-bar{flex:0 0 60px}
  .terminal{font-size:12px;padding:8px 10px}
  .cmd-input{font-size:13px}
  .bottom-bar button{font-size:9px;padding:3px 8px}
}
</style>
</head>
<body>
<div class="scanlines"></div>
<div class="crt-container" id="crt">
  <div class="top-bar" id="topbar" style="display:none">
    <span class="logo" id="logoText">WARGAME</span>
    <span class="sep">|</span>
    <span class="level-info" id="levelInfo">Lvl 1/25</span>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <span class="timer" id="timerDisplay">0:00</span>
    <span class="xp" id="xpDisplay">XP: 0</span>
    <span class="rank" id="rankDisplay">SCRIPT KIDDIE</span>
    <button class="sound-btn" id="soundBtn" title="Toggle sound">SND ON</button>
  </div>
  <div class="terminal" id="terminal"></div>
  <div class="input-area" id="inputArea" style="display:none">
    <span class="prompt-text" id="promptText">$</span>
    <input type="text" class="cmd-input" id="cmdInput" placeholder="type a command..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
  </div>
  <div class="bottom-bar" id="bottomBar" style="display:none">
    <button onclick="showHint()">HINT</button>
    <button onclick="showStats()">STATS</button>
    <button onclick="showAchievements()">ACHIEVEMENTS</button>
    <button onclick="resetGame()">RESET</button>
  </div>
</div>
<div class="modal-overlay" id="statsModal">
  <div class="modal"><button class="close-btn" onclick="closeModals()">&times;</button><h2>STATS</h2><div id="statsContent"></div></div>
</div>
<div class="modal-overlay" id="achModal">
  <div class="modal"><button class="close-btn" onclick="closeModals()">&times;</button><h2>ACHIEVEMENTS</h2><div id="achContent"></div></div>
</div>
<script>
// Theme support: ?theme=sapphire or ?theme=weatherlight
(function(){
    var themes = {
        violet: {},
        sapphire: {
            '--accent': '#00b4d8',
            '--accent-dim': '#00b4d844',
            '--accent-bright': '#48cae4',
            '--secondary': '#0077b6',
            '--secondary-dim': '#0077b644',
            '--bg': '#0a1628',
            '--bg-panel': '#061020',
            '--bg-card': '#0d1f38',
            '--text': '#c8d6e5',
            '--text-dim': '#c8d6e566',
            '--success': '#00cc66',
            '--error': '#e74c3c',
            '--warn': '#f39c12',
            '--border': '#ffffff10',
            '--glow': '#00b4d8',
            '--term-green': '#00b4d8',
            '--term-bg': '#0a1628',
            '--term-border': '#00b4d833',
            '--term-green-bright': '#00b4d8cc',
            '--term-green-dim': '#00b4d844',
            '--term-green-glow': '#00b4d866',
            '--term-green-subtle': '#00b4d822',
            '--term-green-faint': '#00b4d811',
            '--term-green-mid': '#00b4d888',
            '--term-green-muted': '#00b4d899',
            '--term-dim-text': '#34495e88',
            '--term-progress-dark': '#0096c7',
            '--xp-color': '#48cae4',
            '--xp-glow': '#48cae466',
            '--timer-color': '#f39c12',
            '--overlay-bg': 'rgba(6,16,32,0.9)',
            '--scanline-opacity': '0.5',
            '--crt-glow-inner': 'rgba(0,180,216,0.03)',
            '--crt-glow-outer': 'rgba(0,180,216,0.05)',
            '--flash-glow': 'rgba(0,180,216,0.3)'
        },
        weatherlight: {
            '--accent': '#1a3a5c',
            '--accent-dim': '#1a3a5c44',
            '--accent-bright': '#2a5a8c',
            '--secondary': '#6fa8c7',
            '--secondary-dim': '#6fa8c744',
            '--bg': '#f5f7fa',
            '--bg-panel': '#e8ecf1',
            '--bg-card': '#ffffff',
            '--text': '#2c3e50',
            '--text-dim': '#2c3e5066',
            '--success': '#27ae60',
            '--error': '#c0392b',
            '--warn': '#d4a017',
            '--border': '#00000012',
            '--glow': '#6fa8c7',
            '--term-green': '#1a3a5c',
            '--term-bg': '#f0f2f5',
            '--term-border': '#1a3a5c33',
            '--term-green-bright': '#1a3a5ccc',
            '--term-green-dim': '#1a3a5c44',
            '--term-green-glow': '#1a3a5c66',
            '--term-green-subtle': '#1a3a5c22',
            '--term-green-faint': '#1a3a5c11',
            '--term-green-mid': '#1a3a5c88',
            '--term-green-muted': '#1a3a5c99',
            '--term-dim-text': '#7f8c8d88',
            '--term-progress-dark': '#2a5a8c',
            '--xp-color': '#2a5a8c',
            '--xp-glow': '#2a5a8c66',
            '--timer-color': '#d4a017',
            '--overlay-bg': 'rgba(245,247,250,0.9)',
            '--scanline-opacity': '0.05',
            '--crt-glow-inner': 'rgba(26,58,92,0.02)',
            '--crt-glow-outer': 'rgba(26,58,92,0.03)',
            '--flash-glow': 'rgba(26,58,92,0.15)'
        }
    };
    var p = new URLSearchParams(window.location.search);
    var theme = p.get('theme') || 'violet';
    var overrides = themes[theme];
    if (overrides) {
        var root = document.documentElement;
        for (var k in overrides) root.style.setProperty(k, overrides[k]);
    }
    // Update meta theme-color
    var metaThemeColors = { violet: '#00ff88', sapphire: '#00b4d8', weatherlight: '#1a3a5c' };
    var metaEl = document.querySelector('meta[name="theme-color"]');
    if (metaEl && metaThemeColors[theme]) metaEl.setAttribute('content', metaThemeColors[theme]);
    // Update color-scheme meta for light theme
    if (theme === 'weatherlight') {
        var csEl = document.querySelector('meta[name="color-scheme"]');
        if (csEl) csEl.setAttribute('content', 'light');
    }
    // Brand support: ?brand=Custom+Name
    var brand = p.get('brand');
    if (brand) {
        document.title = brand + ' WARGAME';
    } else if (theme !== 'violet') {
        // Hide VV branding for non-violet themes
        document.title = 'WARGAME';
    }
    // Update logo text
    var logoEl = document.getElementById('logoText');
    if (logoEl && brand) {
        logoEl.textContent = brand;
    }
    // Store for later use by boot sequence
    window.__vvTheme = theme;
    window.__vvBrand = brand;
})();
(function(){
'use strict';

// ===== AUTH GATE =====
var token = localStorage.getItem('vv-token');
if (!token) {
  document.getElementById('terminal').innerHTML =
    '<div style="text-align:center;padding-top:30vh">' +
    '<div style="color:var(--error);font-size:14px;letter-spacing:3px;margin-bottom:16px">ACCESS DENIED</div>' +
    '<div style="color:var(--text-dim);font-size:11px;letter-spacing:2px;margin-bottom:24px">authentication required</div>' +
    '<a href="lab.html" style="color:var(--term-green);font-size:11px;letter-spacing:2px;text-decoration:underline">LOGIN</a></div>';
  return;
}

// ===== DOM =====
var termEl = document.getElementById('terminal');
var inputEl = document.getElementById('cmdInput');
var promptEl = document.getElementById('promptText');
var topbar = document.getElementById('topbar');
var inputArea = document.getElementById('inputArea');
var bottomBar = document.getElementById('bottomBar');
var progressFill = document.getElementById('progressFill');
var levelInfoEl = document.getElementById('levelInfo');
var timerEl = document.getElementById('timerDisplay');
var xpEl = document.getElementById('xpDisplay');
var rankEl = document.getElementById('rankDisplay');
var soundBtn = document.getElementById('soundBtn');
var crt = document.getElementById('crt');

// ===== AUDIO =====
var audioCtx = null;
var soundEnabled = true;
function ensureAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
function playTone(freq, dur, type, vol) {
  if (!soundEnabled) return;
  try {
    ensureAudio();
    var o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = type || 'square'; o.frequency.value = freq; g.gain.value = vol || 0.05;
    o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + dur);
  } catch (e) {}
}
function sndKey() { playTone(800 + Math.random() * 400, 0.02, 'square', 0.015); }
function sndSuccess() { playTone(523, 0.1, 'sine', 0.08); setTimeout(function() { playTone(659, 0.1, 'sine', 0.08); }, 100); setTimeout(function() { playTone(784, 0.2, 'sine', 0.1); }, 200); }
function sndFail() { playTone(200, 0.15, 'sawtooth', 0.06); setTimeout(function() { playTone(150, 0.2, 'sawtooth', 0.06); }, 150); }
function sndBoot() { playTone(440, 0.05, 'square', 0.03); setTimeout(function() { playTone(660, 0.05, 'square', 0.03); }, 60); }

soundBtn.addEventListener('click', function() {
  soundEnabled = !soundEnabled; soundBtn.textContent = soundEnabled ? 'SND ON' : 'SND OFF';
});

// ===== STATE =====
var state = loadState();
function defaultState() { return { level: 1, xp: 0, achievements: [], levelTimes: {}, hintsUsed: {}, cmdCount: 0, totalTime: 0, history: [] }; }
function loadState() { try { var s = JSON.parse(localStorage.getItem('wg-state')); return s && s.level ? s : defaultState(); } catch (e) { return defaultState(); } }
function saveState() { localStorage.setItem('wg-state', JSON.stringify(state)); }

var cmdHistory = state.history.slice(-200);
var histIdx = -1;
var levelTimer = null;
var levelSeconds = 0;
var currentFS = {};
var currentUser = 'bandit0';
var currentDir = '/home/bandit0';
var envVars = {};
var levelPassword = '';
var hintsGiven = 0;
var gameStarted = false;

// ===== RANKS =====
var RANKS = [
  { name: 'SCRIPT KIDDIE', xp: 0 }, { name: 'HACKER', xp: 500 }, { name: 'ELITE', xp: 1500 },
  { name: 'ROOT', xp: 3000 }, { name: 'ZERO DAY', xp: 5000 }
];
function getRank(xp) { var r = RANKS[0]; for (var i = 0; i < RANKS.length; i++) { if (xp >= RANKS[i].xp) r = RANKS[i]; } return r.name; }

// ===== ACHIEVEMENTS =====
var ACH_DEFS = [
  { id: 'first_blood', name: 'First Blood', desc: 'Complete level 1' },
  { id: 'speed_demon', name: 'Speed Demon', desc: 'Complete a level in under 60 seconds' },
  { id: 'no_hints_5', name: 'Silent Operator', desc: 'Complete 5 levels without hints' },
  { id: 'pipe_master', name: 'Pipe Master', desc: 'Use 3+ pipes in one command' },
  { id: 'explorer', name: 'Explorer', desc: 'Use ls in 10 different directories' },
  { id: 'chapter_1', name: 'Script Kiddie', desc: 'Complete Chapter 1' },
  { id: 'chapter_2', name: 'Data Miner', desc: 'Complete Chapter 2' },
  { id: 'chapter_3', name: 'Privilege Escalator', desc: 'Complete Chapter 3' },
  { id: 'chapter_4', name: 'Codebreaker', desc: 'Complete Chapter 4' },
  { id: 'chapter_5', name: 'Zero Day', desc: 'Complete all 25 levels' },
  { id: 'cmd_100', name: 'Keyboard Warrior', desc: 'Type 100 commands' },
  { id: 'cmd_500', name: 'Terminal Addict', desc: 'Type 500 commands' },
  { id: 'historian', name: 'Historian', desc: 'Use the history command' },
  { id: 'grep_master', name: 'Grep Master', desc: 'Use grep 20 times' }
];
var grepCount = 0;
var lsDirs = new Set();
var noHintLevels = 0;

function unlockAch(id) {
  if (state.achievements.indexOf(id) === -1) {
    state.achievements.push(id); saveState();
    var def = ACH_DEFS.find(function(a) { return a.id === id; });
    if (def) printLine('[ACHIEVEMENT UNLOCKED] ' + def.name + ' -- ' + def.desc, 'pink');
    sndSuccess();
  }
}

// ===== PRINTING =====
function printLine(text, cls) {
  var div = document.createElement('div'); div.className = 'line' + (cls ? ' ' + cls : '');
  div.textContent = text; termEl.appendChild(div); scrollToBottom();
}
function scrollToBottom() { termEl.scrollTop = termEl.scrollHeight; }
function clearTerminal() { termEl.innerHTML = ''; }

function typeText(text, cls, speed, cb) {
  var div = document.createElement('div'); div.className = 'line' + (cls ? ' ' + cls : '');
  termEl.appendChild(div);
  var i = 0; speed = speed || 15;
  function tick() { if (i < text.length) { div.textContent += text[i]; i++; scrollToBottom(); setTimeout(tick, speed); } else if (cb) cb(); }
  tick();
}

// ===== TIMER =====
function startTimer() {
  levelSeconds = 0;
  if (levelTimer) clearInterval(levelTimer);
  levelTimer = setInterval(function() { levelSeconds++; timerEl.textContent = formatTime(levelSeconds); }, 1000);
}
function stopTimer() { if (levelTimer) { clearInterval(levelTimer); levelTimer = null; } }
function formatTime(s) { return Math.floor(s / 60) + ':' + ('0' + (s % 60)).slice(-2); }

// ===== UI UPDATE =====
function updateUI() {
  levelInfoEl.textContent = 'Lvl ' + state.level + '/25';
  progressFill.style.width = ((state.level - 1) / 25 * 100) + '%';
  xpEl.textContent = 'XP: ' + state.xp;
  rankEl.textContent = getRank(state.xp);
  promptEl.textContent = currentUser + '@wargame:' + shortPath(currentDir) + '$ ';
}

function shortPath(p) {
  var home = '/home/' + currentUser;
  if (p === home) return '~';
  if (p.indexOf(home + '/') === 0) return '~' + p.slice(home.length);
  return p;
}

// ===== FILESYSTEM =====
function getNode(path) {
  var parts = resolvePath(path).split('/').filter(Boolean);
  var node = currentFS;
  for (var i = 0; i < parts.length; i++) {
    if (!node || typeof node !== 'object' || node.__file) return null;
    node = node[parts[i]]; if (node === undefined) return null;
  }
  return node;
}

function resolvePath(p) {
  if (!p) p = '';
  p = p.replace(/\$(\w+)/g, function(_, v) { return envVars[v] || ''; });
  if (p === '~' || p === '') return '/home/' + currentUser;
  if (p.indexOf('~/') === 0) p = '/home/' + currentUser + p.slice(1);
  if (p[0] !== '/') p = currentDir + '/' + p;
  var parts = p.split('/'); var res = [];
  for (var i = 0; i < parts.length; i++) {
    if (parts[i] === '' || parts[i] === '.') continue;
    if (parts[i] === '..') { if (res.length > 0) res.pop(); }
    else res.push(parts[i]);
  }
  return '/' + res.join('/');
}

function setFile(path, content, perms) {
  var parts = resolvePath(path).split('/').filter(Boolean);
  var node = currentFS;
  for (var i = 0; i < parts.length - 1; i++) {
    if (!node[parts[i]] || typeof node[parts[i]] !== 'object' || node[parts[i]].__file) node[parts[i]] = {};
    node = node[parts[i]];
  }
  node[parts[parts.length - 1]] = { __file: true, content: content || '', perms: perms || 'rw-r--r--', owner: currentUser };
}

function isDir(path) { var n = getNode(path); return n && typeof n === 'object' && !n.__file; }
function isFile(path) { var n = getNode(path); return n && n.__file; }

function listDir(path) {
  var n = getNode(path); if (!n || typeof n !== 'object' || n.__file) return null;
  return Object.keys(n);
}

function readFile(path) {

// ===== PIPE & COMMAND PARSING =====
function execCommand(raw) {

  state.history = cmdHistory.slice(); histIdx = -1; saveState();

  if (state.cmdCount >= 100) unlockAch('cmd_100');
  if (state.cmdCount >= 500) unlockAch('cmd_500');

  // Handle redirect (but not inside pipes)
  var redirectFile = null, appendMode = false;
  var pipeCheck = raw.split('|');
  if (pipeCheck.length === 1) {
    if (raw.indexOf('>>') !== -1) {
      var rp = raw.split('>>'); raw = rp[0].trim(); redirectFile = rp[1].trim(); appendMode = true;
    } else if (raw.indexOf('>') !== -1) {
      var rp2 = raw.split('>'); raw = rp2[0].trim(); redirectFile = rp2[1].trim(); appendMode = false;
    }
  }

  // Pipes
  var pipes = raw.split('|').map(function(s) { return s.trim(); }).filter(Boolean);
  if (pipes.length >= 3) unlockAch('pipe_master');

  var output = null;
  for (var i = 0; i < pipes.length; i++) {
    var result = runSingle(pipes[i], output);
    if (result === null) return;
    output = result;
  }

  if (redirectFile) {
    var rpath = resolvePath(redirectFile);
    if (appendMode) {
      var existing = readFile(rpath);
      setFile(rpath, (existing && existing !== '__NOPERM__' ? existing : '') + output);
    } else {
      setFile(rpath, output);
    }
    return;
  }

  if (output !== null && output !== undefined && output !== '') printLine(output);
}

function runSingle(cmdStr, pipedInput) {
  var parts = parseArgs(cmdStr);
  if (parts.length === 0) return '';
  var cmd = parts[0]; var args = parts.slice(1);

  var fn = COMMANDS[cmd];
  if (fn) return fn(args, pipedInput);

  if (cmd === 'export' && args.length > 0) {
    var eq = args.join(' '); var ei = eq.indexOf('=');
    if (ei > 0) { envVars[eq.slice(0, ei)] = eq.slice(ei + 1).replace(/^["']|["']$/g, ''); }
    return '';
  }
  if (cmd === 'submit') return submitPassword(args.join(' '));

  return cmd + ': command not found';
}

function parseArgs(str) {
  var args = []; var current = ''; var inQuote = false; var quoteChar = '';
  for (var i = 0; i < str.length; i++) {
    var c = str[i];
    if (inQuote) {

    } else if (c === '"' || c === "'") { inQuote = true; quoteChar = c; }
    else if (c === ' ' || c === '\t') { if (current) { args.push(current); current = ''; } }
    else { current += c; }
  }
  if (current) args.push(current);
  return args;
}

COMMANDS.ls = function(args, piped) {

      if (a.indexOf('R') !== -1) recursive = true;

  if (paths.length === 0) paths.push('.');

  var target = resolvePath(paths[0]);
  lsDirs.add(target);
  if (lsDirs.size >= 10) unlockAch('explorer');

  function lsOne(dir, prefix) {
    var items = listDir(dir);
    if (!items) return dir + ': No such file or directory';
    if (!showAll) items = items.filter(function(n) { return n[0] !== '.'; });
    if (showAll) items = ['.', '..'].concat(items);

    var result = [];

        var owner = (node && node.owner) || currentUser;

  return simpleHash(text + 'sha256') + '  ' + (file || '-');
};

function simpleHash(str) {
  var h = 0; for (var i = 0; i < str.length; i++) { h = ((h << 5) - h) + str.charCodeAt(i); h |= 0; }
  var hex = Math.abs(h).toString(16);
  while (hex.length < 32) hex += Math.abs(hashPart(str + hex)).toString(16);
  return hex.slice(0, 32);
}
function hashPart(str) { var h = 5381; for (var i = 0; i < str.length; i++) { h = ((h << 5) + h) + str.charCodeAt(i); } return h; }

function rot13(s) {
  return s.replace(/[A-Za-z]/g, function(c) {
    var base = c <= 'Z' ? 65 : 97;
    return String.fromCharCode((c.charCodeAt(0) - base + 13) % 26 + base);
  });
}

function mkfile(content, perms, extra) {
  var f = { __file: true, content: content || '', perms: perms || 'rw-r--r--', owner: 'root' };
  if (extra) { for (var k in extra) f[k] = extra[k]; }
  return f;
}

// ===== LEVEL MANAGEMENT =====
function loadLevel(num) {
  if (num < 1 || num > 25) { printLine('Invalid level.', 'error'); return; }
  var def = LEVELS[num]; if (!def) { printLine('Level ' + num + ' not defined.', 'error'); return; }

  state.level = num; saveState();
  stopTimer();

  currentUser = def.user;
  currentDir = '/home/' + currentUser;
  envVars = { HOME: '/home/' + currentUser, USER: currentUser, PATH: '/usr/bin:/bin' };
  currentFS = def.fs();
  levelPassword = def.password;
  hintsGiven = 0;

  if (def.onInit) def.onInit(currentFS);

  clearTerminal();

  var chapterStarts = { 1: 1, 2: 6, 3: 11, 4: 16, 5: 21 };
  var chapterIntros = {
    1: "You've found a terminal. Let's see what you can do.",
    2: 'The logs contain secrets. Extract what we need.',
    3: 'Time to escalate. You need higher access.',
    4: 'The data is encrypted. Break the codes.',
    5: 'This is the heist. Everything leads here.'
  };

  if (chapterStarts[def.chapter] === num) {
    printLine('');
    printLine('================================================================', 'dim');
    printLine('  CHAPTER ' + def.chapter + ': ' + def.chapterName, 'bold');
    printLine('================================================================', 'dim');
    printLine('');
    typeText(chapterIntros[def.chapter], 'info', 20, function() { showMOTD(def, num); });
  } else {
    showMOTD(def, num);
  }
}

function showMOTD(def, num) {
  printLine('');
  printLine('+----------------------------------------------+', 'dim');
  printLine('|  WARGAME Level ' + num + '/25 -- ' + def.title, 'dim');
  printLine('+----------------------------------------------+', 'dim');
  var motdLines = def.motd.split('\n');
  for (var i = 0; i < motdLines.length; i++) printLine('|  ' + motdLines[i], 'dim');
  printLine('+----------------------------------------------+', 'dim');
  printLine('|  Type "hint" if stuck. "man <cmd>" for help. |', 'dim');
  printLine('+----------------------------------------------+', 'dim');
  printLine('');
  updateUI();
  startTimer();
}

function submitPassword(pw) {
  pw = pw.trim();
  if (!pw) { printLine('Usage: submit <password>', 'warn'); return null; }
  if (pw === levelPassword) {
    stopTimer(); sndSuccess();
    crt.classList.add('level-complete-flash');
    setTimeout(function() { crt.classList.remove('level-complete-flash'); }, 800);

    var xpGain = 100;
    if (levelSeconds < 60) { xpGain += 50; unlockAch('speed_demon'); }
    if (hintsGiven === 0) { xpGain += 30; noHintLevels++; if (noHintLevels >= 5) unlockAch('no_hints_5'); }
    state.xp += xpGain;
    state.levelTimes[state.level] = levelSeconds;
    state.totalTime += levelSeconds;
    if (!state.hintsUsed[state.level]) state.hintsUsed[state.level] = 0;

    printLine('');
    printLine('================================================', 'success');
    printLine('  ACCESS GRANTED', 'success');
    printLine('  Password correct: ' + pw, 'success');
    printLine('  Time: ' + formatTime(levelSeconds) + ' | XP earned: +' + xpGain, 'info');
    printLine('================================================', 'success');

    if (state.level === 1) unlockAch('first_blood');
    if (state.level === 5) unlockAch('chapter_1');
    if (state.level === 10) unlockAch('chapter_2');
    if (state.level === 15) unlockAch('chapter_3');
    if (state.level === 20) unlockAch('chapter_4');
    if (state.level === 25) {
      unlockAch('chapter_5');
      printLine('');
      printLine('================================================', 'pink');
      printLine('  CONGRATULATIONS -- YOU BEAT WARGAME!', 'pink');
      printLine('  Total XP: ' + state.xp, 'pink');
      printLine('  Rank: ' + getRank(state.xp), 'pink');
      printLine('  Achievements: ' + state.achievements.length + '/' + ACH_DEFS.length, 'pink');
      printLine('================================================', 'pink');
      saveState(); updateUI();
      return null;
    }

    state.level++; saveState();
    printLine('');
    printLine('Connecting to next level...', 'dim');
    setTimeout(function() { loadLevel(state.level); }, 2000);
    return null;
  } else {
    sndFail();
    crt.classList.add('glitch');
    setTimeout(function() { crt.classList.remove('glitch'); }, 300);
    printLine('ACCESS DENIED -- incorrect password', 'error');
    return null;
  }
}

// ===== HINTS =====
function showHintCmd() {
  var def = LEVELS[state.level];
  if (!def || !def.hints) return 'No hints available.';
  if (hintsGiven >= def.hints.length) return 'No more hints for this level.';
  var hint = def.hints[hintsGiven];
  hintsGiven++;
  if (!state.hintsUsed[state.level]) state.hintsUsed[state.level] = 0;
  state.hintsUsed[state.level]++;
  state.xp = Math.max(0, state.xp - 10); saveState(); updateUI();
  printLine('[HINT ' + hintsGiven + '/' + def.hints.length + '] ' + hint, 'warn');
  printLine('(-10 XP)', 'dim');
  return null;
}
window.showHint = function() { showHintCmd(); };

// ===== INPUT =====
inputEl.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    var val = inputEl.value; inputEl.value = '';
    printLine(currentUser + '@wargame:' + shortPath(currentDir) + '$ ' + val, '');
    if (val.trim()) execCommand(val);
    sndKey();
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (histIdx === -1) histIdx = cmdHistory.length;
    histIdx--; if (histIdx < 0) histIdx = 0;
    if (cmdHistory[histIdx]) inputEl.value = cmdHistory[histIdx];
  } else if (e.key === 'ArrowDown') {
    e.preventDefault(); histIdx++;
    if (histIdx >= cmdHistory.length) { histIdx = -1; inputEl.value = ''; }
    else if (cmdHistory[histIdx]) inputEl.value = cmdHistory[histIdx];
  } else if (e.key === 'Tab') {
    e.preventDefault(); tabComplete();
  } else if (e.key === 'l' && e.ctrlKey) {
    e.preventDefault(); clearTerminal();
  }
});

function tabComplete() {
  var val = inputEl.value;
  var parts = val.split(' ');
  var last = parts[parts.length - 1];
  if (!last) return;

  if (parts.length === 1) {
    var cmds = Object.keys(COMMANDS).concat(['submit', 'export', 'hint']);
    var matches = cmds.filter(function(c) { return c.indexOf(last) === 0; });
    if (matches.length === 1) inputEl.value = matches[0] + ' ';
    else if (matches.length > 1) printLine(matches.join('  '), 'dim');
    return;
  }

  var dir = currentDir; var prefix = last;
  if (last.indexOf('/') !== -1) {
    var li = last.lastIndexOf('/');
    dir = resolvePath(last.slice(0, li + 1));
    prefix = last.slice(li + 1);
  }
  var items = listDir(dir); if (!items) return;
  var matches = items.filter(function(n) { return n.indexOf(prefix) === 0; });
  if (matches.length === 1) {
    var base = last.indexOf('/') !== -1 ? last.slice(0, last.lastIndexOf('/') + 1) : '';
    parts[parts.length - 1] = base + matches[0];
    if (isDir(dir + '/' + matches[0])) parts[parts.length - 1] += '/';
    inputEl.value = parts.join(' ');
  } else if (matches.length > 1) {
    printLine(matches.join('  '), 'dim');
  }
}

document.addEventListener('click', function(e) {
  if (!e.target.closest('.modal') && !e.target.closest('.bottom-bar') && !e.target.closest('.top-bar')) inputEl.focus();
});
