<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="darkreader-lock" />
<title>AWS Cheat Sheets · WeatherLight Advisors</title>
<style>
  :root {
    --bg: #f7fbff;
    --panel: #ffffff;
    --ink: #1a3a6e;
    --ink-2: #4a5e7e;
    --muted: #6b7c93;
    --border: #d8e6f3;
    --border-soft: #eef3f9;
    --accent: #2c5aa0;
    --accent-2: #5b9bd5;
    --code-bg: #f0f7fd;
  }
  html.theme-sapphire {
    --bg: #0a0a0f;
    --panel: #161b22;
    --ink: #ffffff;
    --ink-2: #c9d1d9;
    --muted: #8b949e;
    --border: rgba(255, 255, 255, 0.08);
    --border-soft: rgba(255, 255, 255, 0.04);
    --accent: #00d4aa;
    --accent-2: #00d4aa;
    --code-bg: #0d1117;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .cs-app {
    display: grid;
    grid-template-columns: 320px 1fr;
    grid-template-rows: 64px 1fr;
    height: 100vh; height: 100dvh;
  }
  .cs-header {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 0 1.25rem;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
  }
  .cs-title { font-size: 1rem; font-weight: 700; letter-spacing: -0.01em; color: var(--ink); }
  .cs-title .pre { color: var(--accent); }
  .cs-cat-filter {
    margin-left: auto;
    display: flex;
    gap: 0.3rem;
    flex-wrap: wrap;
  }
  .cs-cat-pill {
    padding: 0.4rem 0.85rem;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 100px;
    color: var(--ink-2);
    font-size: 0.78rem;
    font-weight: 600;
    cursor: pointer;
  }
  .cs-cat-pill.active { background: var(--accent); color: #ffffff; border-color: var(--accent); }
  html.theme-sapphire .cs-cat-pill.active { color: #0a0a0f; }

  .cs-list {
    background: var(--panel);
    border-right: 1px solid var(--border);
    overflow-y: auto;
  }
  .cs-search-wrap { padding: 0.85rem 1rem; border-bottom: 1px solid var(--border-soft); }
  .cs-search {
    width: 100%;
    padding: 0.65rem 0.85rem;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--ink);
    font-size: 0.9rem;
    font-family: inherit;
  }
  .cs-search:focus { outline: none; border-color: var(--accent-2); box-shadow: 0 0 0 3px rgba(91, 155, 213, 0.18); }
  .cs-item {
    padding: 0.85rem 1rem;
    border-bottom: 1px solid var(--border-soft);
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s;
  }
  .cs-item:hover { background: var(--bg); }
  .cs-item.active { background: var(--bg); border-left: 3px solid var(--accent); padding-left: calc(1rem - 3px); }
  .cs-item-title { font-size: 0.95rem; font-weight: 700; color: var(--ink); margin-bottom: 0.2rem; }
  .cs-item-cat {
    display: inline-block;
    font-size: 0.65rem;
    font-weight: 700;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 0.3rem;
  }
  .cs-item-summary { font-size: 0.82rem; color: var(--muted); line-height: 1.45; }

  .cs-detail {
    overflow-y: auto;
    padding: 2rem 2.5rem 4rem;
    max-width: 880px;
    margin: 0 auto;
    width: 100%;
  }
  .cs-detail-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--muted);
    text-align: center;
    padding: 2rem;
  }
  .cs-detail-tag {
    display: inline-block;
    font-size: 0.7rem;
    font-weight: 700;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 0.6rem;
  }
  .cs-detail-title {
    font-size: 2rem;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: -0.02em;
    margin-bottom: 0.85rem;
    line-height: 1.15;
  }
  .cs-detail-tags { margin-bottom: 1.75rem; display: flex; gap: 0.4rem; flex-wrap: wrap; }
  .cs-tag {
    font-size: 0.7rem;
    font-weight: 700;
    color: var(--ink-2);
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 0.2rem 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  /* Markdown rendered */
  .cs-body { color: var(--ink-2); line-height: 1.7; font-size: 0.96rem; }
  .cs-body h2 { color: var(--ink); font-size: 1.2rem; margin: 1.75rem 0 0.5rem; letter-spacing: -0.01em; }
  .cs-body h3 { color: var(--ink); font-size: 1.02rem; margin: 1.25rem 0 0.4rem; }
  .cs-body p { margin: 0.6rem 0; }
  .cs-body ul, .cs-body ol { margin: 0.6rem 0 0.6rem 1.5rem; }
  .cs-body li { margin: 0.3rem 0; }
  .cs-body code { background: var(--code-bg); border: 1px solid var(--border); padding: 0.1rem 0.4rem; border-radius: 4px; font-family: 'SF Mono', Consolas, monospace; font-size: 0.86em; }
  .cs-body pre { background: var(--code-bg); border: 1px solid var(--border); border-radius: 6px; padding: 0.85rem 1rem; overflow-x: auto; font-family: 'SF Mono', Consolas, monospace; font-size: 0.85rem; margin: 0.85rem 0; }
  .cs-body pre code { background: transparent; border: 0; padding: 0; }
  .cs-body strong { color: var(--ink); }
  .cs-body table { width: 100%; border-collapse: collapse; margin: 1rem 0; font-size: 0.88rem; }
  .cs-body th, .cs-body td { padding: 0.55rem 0.85rem; text-align: left; border-bottom: 1px solid var(--border-soft); }
  .cs-body th { color: var(--ink); font-weight: 700; background: var(--code-bg); }
  .cs-body blockquote { border-left: 3px solid var(--accent); background: var(--code-bg); margin: 1rem 0; padding: 0.6rem 1rem; border-radius: 0 6px 6px 0; }

  .cs-no-results {
    padding: 2rem 1rem;
    text-align: center;
    color: var(--muted);
    font-style: italic;
    font-size: 0.88rem;
  }

  @media (max-width: 760px) {
    .cs-app { grid-template-columns: 1fr; grid-template-rows: 64px auto 1fr; }
    .cs-list { max-height: 240px; border-right: 0; border-bottom: 1px solid var(--border); }
    .cs-cat-filter { display: none; }
  }
</style>
</head>
<body>
<div class="cs-app">
  <header class="cs-header">
    <div class="cs-title"><span class="pre">▤</span> AWS Cheat Sheets</div>
    <div class="cs-cat-filter" id="cs-cat-filter"></div>
  </header>
  <aside class="cs-list">
    <div class="cs-search-wrap">
      <input type="search" class="cs-search" id="cs-search" placeholder="Search sheets…" autocomplete="off" />
    </div>
    <div id="cs-items"></div>
  </aside>
  <main class="cs-detail" id="cs-detail">
    <div class="cs-detail-empty">
      <div style="font-size:2.4rem;opacity:0.35;margin-bottom:0.8rem;">▤</div>
      <div style="font-size:0.95rem;">Pick a cheat sheet from the left.</div>
    </div>
  </main>
</div>
<script>
(async function () {
  // Theme
  var p = new URLSearchParams(location.search);
  var theme = p.get("theme") || "weatherlight";
  if (theme === "sapphire") document.documentElement.classList.add("theme-sapphire");

  // Tiny markdown renderer — covers what we use (headings, paragraphs,
  // lists, tables, code, bold, italic, blockquotes). Not a full parser.
  function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function md(src) {
    // Code fences first (so the regex doesn't bleed)
    src = src.replace(/```([^`]*?)```/gs, function (_, c) {
      return '<pre><code>' + escapeHtml(c.trim()) + '</code></pre>';
    });
    // Tables (lightweight: lines with | separators surrounded by blank lines)
    src = src.replace(/((?:^\|.*\|\s*\n)+)/gm, function (block) {
      var lines = block.trim().split('\n');
      if (lines.length < 2) return block;
      var head = lines[0].split('|').slice(1, -1).map(function (s) { return s.trim(); });
      // skip the separator row (---)
      var body = lines.slice(2).map(function (l) {
        return l.split('|').slice(1, -1).map(function (s) { return s.trim(); });
      });
      var html = '<table><thead><tr>' + head.map(function (h) { return '<th>' + inline(h) + '</th>'; }).join('') + '</tr></thead><tbody>';
      body.forEach(function (row) {
        html += '<tr>' + row.map(function (c) { return '<td>' + inline(c) + '</td>'; }).join('') + '</tr>';
      });
      html += '</tbody></table>';
      return html;
    });
    // Headings
    src = src.replace(/^### (.+)$/gm, '<h3>$1</h3>');
    src = src.replace(/^## (.+)$/gm, '<h2>$1</h2>');
    src = src.replace(/^# (.+)$/gm, '<h2>$1</h2>');
    // Blockquotes
    src = src.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
    // Lists (consecutive lines starting with - or *)
    src = src.replace(/((?:^[-*] .+\n?)+)/gm, function (block) {
      var items = block.trim().split('\n').map(function (l) { return l.replace(/^[-*]\s+/, ''); });
      return '<ul>' + items.map(function (i) { return '<li>' + inline(i) + '</li>'; }).join('') + '</ul>';
    });
    src = src.replace(/((?:^\d+\. .+\n?)+)/gm, function (block) {
      var items = block.trim().split('\n').map(function (l) { return l.replace(/^\d+\.\s+/, ''); });
      return '<ol>' + items.map(function (i) { return '<li>' + inline(i) + '</li>'; }).join('') + '</ol>';
    });
    // Paragraphs (consecutive non-empty lines that aren't already inside a tag)
    src = src.split(/\n{2,}/).map(function (chunk) {
      var t = chunk.trim();
      if (!t) return '';
      if (/^<(h2|h3|ul|ol|table|pre|blockquote)/.test(t)) return t;
      return '<p>' + inline(t).replace(/\n/g, '<br/>') + '</p>';
    }).join('\n');
    return src;
    function inline(s) {
      // inline code
      s = s.replace(/`([^`]+)`/g, function (_, c) { return '<code>' + escapeHtml(c) + '</code>'; });
      // bold then italic
      s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      s = s.replace(/\*([^*]+)\*/g, '<em>$1</em>');
      // links
      s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
      return s;
    }
  }

  // Load sheets
  var resp;
  try {
    resp = await fetch('../cheatsheets.json');
    if (!resp.ok) resp = await fetch('/cheatsheets.json');
  } catch (e) {}
  var data = resp && resp.ok ? await resp.json() : { sheets: [] };
  var sheets = data.sheets || [];
  var activeId = location.hash.replace('#', '') || null;
  var activeCat = 'all';
  var query = '';

  // Build category filter
  var cats = ['all'].concat(Array.from(new Set(sheets.map(function (s) { return s.category; }))).sort());
  var catEl = document.getElementById('cs-cat-filter');
  cats.forEach(function (c) {
    var b = document.createElement('button');
    b.className = 'cs-cat-pill' + (activeCat === c ? ' active' : '');
    b.textContent = c === 'all' ? 'All' : c;
    b.addEventListener('click', function () { activeCat = c; render(); });
    catEl.appendChild(b);
  });

  function render() {
    // Update active category styling
    catEl.querySelectorAll('.cs-cat-pill').forEach(function (b, i) {
      b.classList.toggle('active', cats[i] === activeCat);
    });
    // Filter
    var q = query.toLowerCase().trim();
    var filtered = sheets.filter(function (s) {
      if (activeCat !== 'all' && s.category !== activeCat) return false;
      if (!q) return true;
      var hay = (s.title + ' ' + s.summary + ' ' + (s.tags || []).join(' ') + ' ' + s.body).toLowerCase();
      return hay.indexOf(q) !== -1;
    });
    // List
    var listEl = document.getElementById('cs-items');
    listEl.innerHTML = '';
    if (filtered.length === 0) {
      var no = document.createElement('div');
      no.className = 'cs-no-results';
      no.textContent = 'No sheets match.';
      listEl.appendChild(no);
    }
    filtered.forEach(function (s) {
      var item = document.createElement('div');
      item.className = 'cs-item' + (activeId === s.id ? ' active' : '');
      item.innerHTML =
        '<div class="cs-item-cat">' + s.category + '</div>' +
        '<div class="cs-item-title">' + s.title + '</div>' +
        '<div class="cs-item-summary">' + s.summary + '</div>';
      item.addEventListener('click', function () {
        activeId = s.id;
        location.hash = s.id;
        render();
      });
      listEl.appendChild(item);
    });
    // Detail
    var detailEl = document.getElementById('cs-detail');
    var active = sheets.find(function (s) { return s.id === activeId; });
    if (active) {
      detailEl.innerHTML =
        '<div class="cs-detail-tag">' + active.category + '</div>' +
        '<h1 class="cs-detail-title">' + active.title + '</h1>' +
        '<div class="cs-detail-tags">' +
          (active.tags || []).map(function (t) { return '<span class="cs-tag">' + t + '</span>'; }).join('') +
        '</div>' +
        '<div class="cs-body">' + md(active.body) + '</div>';
    } else if (filtered.length > 0 && !activeId) {
      // Default to the first sheet on load
      activeId = filtered[0].id;
      location.hash = activeId;
      render();
      return;
    } else if (filtered.length === 0) {
      detailEl.innerHTML = '<div class="cs-detail-empty"><div style="font-size:2.4rem;opacity:0.35;margin-bottom:0.8rem;">▤</div><div>No sheet selected.</div></div>';
    }
  }

  document.getElementById('cs-search').addEventListener('input', function (e) {
    query = e.target.value;
    render();
  });

  render();
})();
</script>
</body>
</html>
