<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice Quiz</title>
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#bb44ff">
    <meta name="color-scheme" content="dark">
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --accent: #bb44ff;
            --accent-dim: #bb44ff44;
            --accent-bright: #dd77ff;
            --secondary: #00ffee;
            --secondary-dim: #00ffee44;
            --bg: #0a0a0f;
            --bg-panel: #08080e;
            --bg-card: #111118;
            --text: #ccccdd;
            --text-dim: #ccccdd66;
            --success: #00ff88;
            --error: #ff2040;
            --warn: #ffaa00;
            --border: #ffffff12;
            --glow: var(--accent);
            --accent-bg-subtle: rgba(187,68,255,0.03);
            --accent-bg-hover: rgba(187,68,255,0.05);
            --accent-bg-active: rgba(187,68,255,0.1);
            --accent-border: rgba(187,68,255,0.3);
            --secondary-bg-hover: rgba(0,255,238,0.06);
            --secondary-bg-active: rgba(0,255,238,0.1);
            --success-border: #00ff88;
            --success-bg: rgba(0,255,136,0.08);
            --success-border-dim: rgba(0,255,136,0.4);
            --success-bg-dim: rgba(0,255,136,0.04);
            --success-text-dim: rgba(0,255,136,0.7);
            --error-bg: rgba(255,32,144,0.06);
            --error-border-subtle: rgba(255,32,144,0.2);
            --card-bg: rgba(255,255,255,0.02);
            --card-border: rgba(255,255,255,0.08);
            --card-border-dim: rgba(255,255,255,0.1);
        }

        .quiz-container { max-width: 720px; margin: 0 auto; }

        .quiz-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
        }
        .quiz-score {
            font-family: var(--mono); font-size: 12px; color: var(--text-dim);
            letter-spacing: 2px;
        }
        .quiz-score span { color: var(--secondary); }
        .quiz-progress {
            font-family: var(--mono); font-size: 11px; color: var(--accent);
            letter-spacing: 1px;
        }

        .quiz-domain-tag {
            display: inline-block; font-family: var(--mono); font-size: 9px;
            color: var(--accent); border: 1px solid var(--accent-border);
            padding: 2px 8px; letter-spacing: 2px; margin-bottom: 12px;
        }
        .quiz-source {
            font-family: var(--mono); font-size: 9px; color: var(--text-dim);
            letter-spacing: 1px; margin-bottom: 16px;
        }

        .quiz-question {
            font-family: var(--mono); font-size: 13px; color: var(--text);
            line-height: 1.7; margin-bottom: 8px; white-space: pre-wrap;
        }
        .quiz-multi-hint {
            font-family: var(--mono); font-size: 10px; color: var(--secondary);
            letter-spacing: 1px; margin-bottom: 16px;
        }

        .quiz-options { list-style: none; padding: 0; margin: 0 0 24px 0; }
        .quiz-option {
            display: block; width: 100%; text-align: left;
            font-family: var(--mono); font-size: 12px; color: var(--text);
            background: var(--card-bg); border: 1px solid var(--card-border);
            padding: 12px 16px; margin-bottom: 8px; cursor: pointer;
            transition: all 0.15s ease; letter-spacing: 0.5px;
        }
        .quiz-option:hover { border-color: var(--accent); background: var(--accent-bg-hover); }
        .quiz-option.selected {
            border-color: var(--secondary); background: var(--secondary-bg-hover);
            color: var(--secondary);
        }
        .quiz-option.correct {
            border-color: var(--success-border); background: var(--success-bg);
            color: var(--success);
        }
        .quiz-option.wrong {
            border-color: var(--error); background: var(--error-bg);
            color: var(--error);
        }
        .quiz-option.missed {
            border-color: var(--success-border-dim); background: var(--success-bg-dim);
            color: var(--success-text-dim);
        }
        .quiz-option[disabled] { cursor: default; pointer-events: none; }

        .quiz-explanation {
            font-family: var(--mono); font-size: 11px; color: var(--text-dim);
            line-height: 1.7; padding: 16px; margin-bottom: 24px;
            border-left: 2px solid var(--accent); background: var(--accent-bg-subtle);
        }
        .quiz-result-label {
            font-family: var(--mono); font-size: 11px; font-weight: 800;
            letter-spacing: 3px; margin-bottom: 12px;
        }
        .quiz-result-correct { color: var(--success); }
        .quiz-result-wrong { color: var(--error); }

        .quiz-actions { display: flex; gap: 12px; flex-wrap: wrap; }
        .quiz-btn {
            font-family: var(--mono); font-size: 10px; letter-spacing: 2px;
            padding: 10px 20px; cursor: pointer; border: 1px solid;
            background: transparent; transition: all 0.15s ease;
        }
        .quiz-btn-next { border-color: var(--secondary); color: var(--secondary); }
        .quiz-btn-next:hover { background: var(--secondary-bg-active); }
        .quiz-btn-submit { border-color: var(--accent); color: var(--accent); }
        .quiz-btn-submit:hover { background: var(--accent-bg-active); }

        /* Mode select */
        .quiz-modes { margin-bottom: 32px; }
        .quiz-mode-btn {
            display: block; width: 100%; text-align: left;
            font-family: var(--mono); font-size: 12px; color: var(--text);
            background: var(--card-bg); border: 1px solid var(--card-border);
            padding: 16px; margin-bottom: 8px; cursor: pointer;
            transition: all 0.15s ease;
        }
        .quiz-mode-btn:hover { border-color: var(--accent); background: var(--accent-bg-hover); }
        .quiz-mode-btn .mode-title { color: var(--secondary); font-weight: 800; letter-spacing: 2px; }
        .quiz-mode-btn .mode-desc { color: var(--text-dim); font-size: 10px; margin-top: 4px; }

        /* Summary */
        .quiz-summary { text-align: center; padding: 40px 0; }
        .quiz-summary-score { font-size: 48px; font-weight: 800; margin-bottom: 8px; }
        .quiz-summary-pass { color: var(--success); }
        .quiz-summary-fail { color: var(--error); }
        .quiz-summary-label {
            font-family: var(--mono); font-size: 11px; color: var(--text-dim);
            letter-spacing: 2px; margin-bottom: 24px;
        }

        /* Domain filter */
        .quiz-domain-filters {
            display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px;
        }
        .quiz-domain-filter {
            font-family: var(--mono); font-size: 9px; letter-spacing: 1px;
            padding: 4px 10px; cursor: pointer; border: 1px solid var(--card-border-dim);
            background: transparent; color: var(--text-dim); transition: all 0.15s ease;
        }
        .quiz-domain-filter:hover, .quiz-domain-filter.active {
            border-color: var(--accent); color: var(--accent);
        }
    </style>
</head>
<body>
    <div class="scanlines"></div>
    <div class="crt-flicker"></div>

    <nav class="nav">
        <a href="index.html" class="nav-brand" id="navBrand" style="color:inherit;text-decoration:none">V://V</a>
        <div class="nav-links">

    <div id="quiz-gate" style="display:none">
        <section class="section" style="padding-top:200px;text-align:center">
            <div style="font-family:var(--mono);font-size:12px;color:var(--error);letter-spacing:3px;margin-bottom:16px;">ACCESS DENIED</div>
            <button class="btn btn-primary" style="font-size:10px;padding:8px 24px;" onclick="document.getElementById('vv-login-overlay').classList.add('open')">LOGIN</button>

            <span class="footer-copy">&copy; 2026</span>
        </div>
    </footer>

    <script>
    // Theme support: ?theme=sapphire or ?theme=weatherlight
    (function(){
        var themes = {
            violet: {},
            sapphire: {
                '--accent': '#00b4d8',
                '--accent-dim': '#00b4d844',
                '--accent-bright': '#48cae4',
                '--secondary': '#0077b6',
                '--secondary-dim': '#0077b644',
                '--bg': '#0a1628',
                '--bg-panel': '#061020',
                '--bg-card': '#0d1f38',
                '--text': '#c8d6e5',
                '--text-dim': '#c8d6e566',
                '--success': '#00cc66',
                '--error': '#e74c3c',
                '--warn': '#f39c12',
                '--border': '#ffffff10',
                '--glow': '#00b4d8',
                '--accent-bg-subtle': 'rgba(0,180,216,0.03)',
                '--accent-bg-hover': 'rgba(0,180,216,0.05)',
                '--accent-bg-active': 'rgba(0,180,216,0.1)',
                '--accent-border': 'rgba(0,180,216,0.3)',
                '--secondary-bg-hover': 'rgba(0,119,182,0.06)',
                '--secondary-bg-active': 'rgba(0,119,182,0.1)',
                '--success-border': '#00cc66',
                '--success-bg': 'rgba(0,204,102,0.08)',
                '--success-border-dim': 'rgba(0,204,102,0.4)',
                '--success-bg-dim': 'rgba(0,204,102,0.04)',
                '--success-text-dim': 'rgba(0,204,102,0.7)',
                '--error-bg': 'rgba(231,76,60,0.06)',
                '--error-border-subtle': 'rgba(231,76,60,0.2)',
                '--card-bg': 'rgba(255,255,255,0.02)',
                '--card-border': 'rgba(255,255,255,0.08)',
                '--card-border-dim': 'rgba(255,255,255,0.1)',
                // Override parent site vars too
                '--violet': '#00b4d8',
                '--violet-bright': '#48cae4',
                '--violet-dim': '#0077b6',
                '--cyan': '#0077b6',
                '--pink': '#e74c3c',
                '--white': '#c8d6e5'
            },
            weatherlight: {
                '--accent': '#1a3a5c',
                '--accent-dim': '#1a3a5c44',
                '--accent-bright': '#2a5a8c',
                '--secondary': '#6fa8c7',
                '--secondary-dim': '#6fa8c744',
                '--bg': '#f5f7fa',
                '--bg-panel': '#e8ecf1',
                '--bg-card': '#ffffff',
                '--text': '#2c3e50',
                '--text-dim': '#2c3e5066',
                '--success': '#27ae60',
                '--error': '#c0392b',
                '--warn': '#d4a017',
                '--border': '#00000012',
                '--glow': '#6fa8c7',
                '--accent-bg-subtle': 'rgba(26,58,92,0.03)',
                '--accent-bg-hover': 'rgba(26,58,92,0.05)',
                '--accent-bg-active': 'rgba(26,58,92,0.1)',
                '--accent-border': 'rgba(26,58,92,0.3)',
                '--secondary-bg-hover': 'rgba(111,168,199,0.08)',
                '--secondary-bg-active': 'rgba(111,168,199,0.12)',
                '--success-border': '#27ae60',
                '--success-bg': 'rgba(39,174,96,0.08)',
                '--success-border-dim': 'rgba(39,174,96,0.4)',
                '--success-bg-dim': 'rgba(39,174,96,0.04)',
                '--success-text-dim': 'rgba(39,174,96,0.7)',
                '--error-bg': 'rgba(192,57,43,0.06)',
                '--error-border-subtle': 'rgba(192,57,43,0.2)',
                '--card-bg': 'rgba(0,0,0,0.02)',
                '--card-border': 'rgba(0,0,0,0.08)',
                '--card-border-dim': 'rgba(0,0,0,0.1)',
                // Override parent site vars too
                '--violet': '#1a3a5c',
                '--violet-bright': '#2a5a8c',
                '--violet-dim': '#0f2744',
                '--cyan': '#6fa8c7',
                '--pink': '#c0392b',
                '--white': '#2c3e50'
            }
        };
        var p = new URLSearchParams(window.location.search);
        var theme = p.get('theme') || 'violet';
        var overrides = themes[theme];
        if (overrides) {
            var root = document.documentElement;
            for (var k in overrides) root.style.setProperty(k, overrides[k]);
        }
        // Update meta theme-color
        var metaThemeColors = { violet: '#bb44ff', sapphire: '#00b4d8', weatherlight: '#1a3a5c' };
        var metaEl = document.querySelector('meta[name="theme-color"]');
        if (metaEl && metaThemeColors[theme]) metaEl.setAttribute('content', metaThemeColors[theme]);
        // Update color-scheme meta for light theme
        if (theme === 'weatherlight') {
            var csEl = document.querySelector('meta[name="color-scheme"]');
            if (csEl) csEl.setAttribute('content', 'light');
        }
        // Reduce scanline effect for light theme
        if (theme === 'weatherlight') {
            var scanEl = document.querySelector('.scanlines');
            if (scanEl) scanEl.style.opacity = '0.03';
            var crtEl = document.querySelector('.crt-flicker');
            if (crtEl) crtEl.style.display = 'none';
        }
        // Brand support: ?brand=Custom+Name
        var brand = p.get('brand');
        var navBrand = document.getElementById('navBrand');
        var footerBrand = document.getElementById('footerBrand');
        if (brand) {
            if (navBrand) navBrand.textContent = brand;
            if (footerBrand) footerBrand.textContent = brand;
        } else if (theme !== 'violet') {
            if (navBrand) navBrand.textContent = '';
            if (footerBrand) footerBrand.textContent = '';
        }
        window.__vvTheme = theme;
        window.__vvBrand = brand;
    })();
    </script>

    <script>
    (async function () {
        var gate = document.getElementById('quiz-gate');
        var app = document.getElementById('quiz-app');

        var token = localStorage.getItem('vv-token');
        if (!token) { gate.style.display = ''; return; }

        var valid = await vvVerify();
        if (!valid) { gate.style.display = ''; return; }

        app.style.display = '';

        // ---- Load questions (generic — ?bank=saa-c03 or default) ----
        var params = new URLSearchParams(window.location.search);
        var bank = params.get('bank') || 'saa-c03';
        var bankUrl = '../banks/' + bank + '.json';
        // Also check for a relative path (when served from a different structure)
        var allQuestions = [];
        try {
            var res = await fetch(bankUrl);
            if (!res.ok) res = await fetch('banks/' + bank + '.json');
            if (!res.ok) res = await fetch(bank + '.json');
            if (!res.ok) throw new Error('Bank not found: ' + bank);
            allQuestions = await res.json();
        } catch (e) {
            document.getElementById('quiz-container').innerHTML =
                '<p style="color:var(--error);font-family:var(--mono)">Failed to load questions for: ' + bank + '</p>';
            return;
        }

        var container = document.getElementById('quiz-container');
        var state = loadState();

        // ---- Persistence ----
        function loadState() {
            try { return JSON.parse(localStorage.getItem('vv-quiz-' + bank) || '{}'); } catch (e) { return {}; }
        }
        function saveState() { localStorage.setItem('vv-quiz-' + bank, JSON.stringify(state)); }

        // Set title from bank name
        var BANK_NAMES = {'saa-c03':'AWS Solutions Architect Associate','dop-c02':'AWS DevOps Engineer Professional'};
        var bankTitle = BANK_NAMES[bank] || bank.toUpperCase();
        document.title = bankTitle + ' Quiz';
        document.getElementById('quiz-title').innerHTML = '<span class="prefix">&gt;</span> ' + bankTitle;

        // ---- Shuffle ----
        function shuffle(arr) {
            var a = arr.slice();
            for (var i = a.length - 1; i > 0; i--) {
                var j = Math.floor(Math.random() * (i + 1));
                var t = a[i]; a[i] = a[j]; a[j] = t;
            }
            return a;
        }

        // ---- Show mode select ----
        function showModeSelect() {
            var answered = Object.keys(state).length;
            var correct = Object.values(state).filter(function (v) { return v; }).length;
            var domains = {};
            allQuestions.forEach(function (q) { domains[q.domain] = (domains[q.domain] || 0) + 1; });

            var statsHtml = answered > 0
                ? '<div class="quiz-score" style="margin-bottom:24px">LIFETIME: <span>' + correct + '</span>/' + answered + ' (' + Math.round(correct / answered * 100) + '%)</div>'
                : '';

            container.innerHTML = statsHtml +
                '<div class="quiz-modes">' +
                    '<button class="quiz-mode-btn" data-mode="quick">' +
                        '<div class="mode-title">QUICK QUIZ</div>' +
                        '<div class="mode-desc">10 random questions</div>' +
                    '</button>' +
                    '<button class="quiz-mode-btn" data-mode="exam">' +
                        '<div class="mode-title">EXAM SIMULATION</div>' +
                        '<div class="mode-desc">65 questions (mirrors real exam)</div>' +
                    '</button>' +
                    '<button class="quiz-mode-btn" data-mode="missed">' +
                        '<div class="mode-title">REVIEW MISSED</div>' +
                        '<div class="mode-desc">Drill your wrong answers</div>' +
                    '</button>' +
                    '<button class="quiz-mode-btn" data-mode="domain">' +
                        '<div class="mode-title">BY DOMAIN</div>' +
                        '<div class="mode-desc">Focus on a specific topic</div>' +
                    '</button>' +
                    '<button class="quiz-mode-btn" data-mode="reset" style="border-color:var(--error-border-subtle)">' +
                        '<div class="mode-title" style="color:var(--error)">RESET PROGRESS</div>' +
                        '<div class="mode-desc">Clear all saved answers</div>' +
                    '</button>' +
                '</div>';

            container.querySelectorAll('.quiz-mode-btn').forEach(function (btn) {
                btn.addEventListener('click', function () {
                    var mode = btn.getAttribute('data-mode');
                    if (mode === 'quick') startQuiz(shuffle(allQuestions).slice(0, 10));
                    else if (mode === 'exam') startQuiz(shuffle(allQuestions).slice(0, 65));
                    else if (mode === 'missed') {
                        var missed = allQuestions.filter(function (q) { return state[q.id] === false; });
                        if (missed.length === 0) {
                            alert('No missed questions. Nice!');
                            return;
                        }
                        startQuiz(shuffle(missed).slice(0, 20));
                    }
                    else if (mode === 'domain') showDomainSelect();
                    else if (mode === 'reset') {
                        if (confirm('Reset all quiz progress?')) {
                            state = {};
                            saveState();
                            showModeSelect();
                        }
                    }
                });
            });
        }

        // ---- Domain select ----
        function showDomainSelect() {
            var domains = {};
            allQuestions.forEach(function (q) { domains[q.domain] = (domains[q.domain] || 0) + 1; });

            var html = '<div style="margin-bottom:16px"><button class="quiz-btn quiz-btn-next" onclick="location.reload()">&larr; BACK</button></div>';
            html += '<div class="quiz-modes">';
            Object.keys(domains).sort().forEach(function (d) {
                html += '<button class="quiz-mode-btn" data-domain="' + d + '">' +
                    '<div class="mode-title">' + d.toUpperCase() + '</div>' +
                    '<div class="mode-desc">' + domains[d] + ' questions</div>' +
                '</button>';
            });
            html += '</div>';
            container.innerHTML = html;

            container.querySelectorAll('[data-domain]').forEach(function (btn) {
                btn.addEventListener('click', function () {
                    var d = btn.getAttribute('data-domain');
                    var pool = allQuestions.filter(function (q) { return q.domain === d; });
                    startQuiz(shuffle(pool));
                });
            });
        }

        // ---- Run quiz ----
        function startQuiz(questions) {
            var idx = 0;
            var sessionCorrect = 0;
            var sessionTotal = questions.length;

            function showQuestion() {
                var q = questions[idx];
                var multi = q.answer.length > 1;
                var selected = [];

                var html = '<div class="quiz-header">' +
                    '<div class="quiz-progress">QUESTION ' + (idx + 1) + ' / ' + sessionTotal + '</div>' +
                    '<div class="quiz-score">SESSION: <span>' + sessionCorrect + '</span> CORRECT</div>' +
                '</div>';

                html += '<div class="quiz-domain-tag">' + q.domain.toUpperCase() + '</div>';
                html += '<div class="quiz-source">Source: ' + q.source + '</div>';
                html += '<div class="quiz-question">' + escapeHtml(q.question) + '</div>';

                if (multi) html += '<div class="quiz-multi-hint">SELECT ' + q.answer.length + ' ANSWERS</div>';

                html += '<ul class="quiz-options">';
                Object.keys(q.options).sort().forEach(function (letter) {
                    html += '<li><button class="quiz-option" data-letter="' + letter + '">' +
                        '<strong>' + letter + ')</strong> ' + escapeHtml(q.options[letter]) +
                    '</button></li>';
                });
                html += '</ul>';

                html += '<div class="quiz-actions">' +
                    '<button class="quiz-btn quiz-btn-submit" id="quiz-submit" style="display:none">SUBMIT</button>' +
                    '<button class="quiz-btn quiz-btn-next" id="quiz-skip" style="opacity:0.4">SKIP</button>' +
                '</div>';

                container.innerHTML = html;

                var options = container.querySelectorAll('.quiz-option');
                var submitBtn = document.getElementById('quiz-submit');
                var skipBtn = document.getElementById('quiz-skip');

                options.forEach(function (opt) {
                    opt.addEventListener('click', function () {
                        var letter = opt.getAttribute('data-letter');

                        if (multi) {
                            var i = selected.indexOf(letter);
                            if (i > -1) { selected.splice(i, 1); opt.classList.remove('selected'); }
                            else { selected.push(letter); opt.classList.add('selected'); }
                        } else {
                            selected = [letter];
                            options.forEach(function (o) { o.classList.remove('selected'); });
                            opt.classList.add('selected');
                        }

                        submitBtn.style.display = selected.length > 0 ? '' : 'none';
                    });
                });

                submitBtn.addEventListener('click', function () { checkAnswer(q, selected, options); });
                skipBtn.addEventListener('click', function () { advance(); });
            }

            function checkAnswer(q, selected, options) {
                var correctSet = q.answer.slice().sort().join(',');
                var userSet = selected.slice().sort().join(',');
                var isCorrect = correctSet === userSet;

                if (isCorrect) sessionCorrect++;
                state[q.id] = isCorrect;
                saveState();

                // Disable all options
                options.forEach(function (opt) {
                    opt.disabled = true;
                    var letter = opt.getAttribute('data-letter');
                    if (q.answer.indexOf(letter) > -1) {
                        opt.classList.add('correct');
                    } else if (selected.indexOf(letter) > -1) {
                        opt.classList.add('wrong');
                    }
                });

                // Show result + explanation
                var resultHtml = isCorrect
                    ? '<div class="quiz-result-label quiz-result-correct">CORRECT</div>'
                    : '<div class="quiz-result-label quiz-result-wrong">INCORRECT — Answer: ' + q.answer.join(', ') + '</div>';

                if (q.explanation) {
                    resultHtml += '<div class="quiz-explanation">' + escapeHtml(q.explanation) + '</div>';
                }

                var actionsEl = container.querySelector('.quiz-actions');
                actionsEl.innerHTML = resultHtml + '<button class="quiz-btn quiz-btn-next" id="quiz-next">' +
                    (idx < sessionTotal - 1 ? 'NEXT' : 'FINISH') + '</button>';

                document.getElementById('quiz-next').addEventListener('click', advance);

                // Update score display
                container.querySelector('.quiz-score').innerHTML = 'SESSION: <span>' + sessionCorrect + '</span> CORRECT';
            }

            function advance() {
                idx++;
                if (idx < sessionTotal) showQuestion();
                else showSummary(sessionCorrect, sessionTotal);
            }

            showQuestion();
        }

        // ---- Summary ----
        function showSummary(correct, total) {
            var pct = Math.round(correct / total * 100);
            var pass = pct >= 72;

            container.innerHTML = '<div class="quiz-summary">' +
                '<div class="quiz-summary-score ' + (pass ? 'quiz-summary-pass' : 'quiz-summary-fail') + '">' + pct + '%</div>' +
                '<div class="quiz-summary-label">' + correct + ' / ' + total + ' CORRECT</div>' +
                '<div class="quiz-summary-label">' + (pass ? 'PASSING SCORE' : 'NEED 72% TO PASS') + '</div>' +
                '<div style="margin-top:24px">' +
                    '<button class="quiz-btn quiz-btn-next" onclick="location.reload()">NEW QUIZ</button>' +
                    ' <a href="lab.html" class="quiz-btn quiz-btn-submit" style="text-decoration:none;display:inline-block">&larr; LAB</a>' +
                '</div>' +
            '</div>';
        }

        function escapeHtml(s) {
            return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        // ---- Start ----
        showModeSelect();
    })();
    </script>
</body>
</html>
