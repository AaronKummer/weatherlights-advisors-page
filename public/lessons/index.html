<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS Lessons — Interactive Learning</title>
    <style>
        :root {
            --accent: #ff9900;
            --accent-dim: #cc7a00;
            --bg: #0a0a14;
            --bg-panel: #0d0d1a;
            --bg-card: #12122a;
            --bg-card-hover: #1a1a3a;
            --border: #2a2a4a;
            --text: #ccccdd;
            --text-dim: #8888aa;
            --text-bright: #eeeeff;
            --success: #4caf50;
            --error: #f44336;
            --compute: #ff9900;
            --storage: #3f8624;
            --database: #2e73b8;
            --networking: #8c4fff;
            --security: #dd3522;
            --serverless: #00bcd4;
            --radius: 8px;
            --shadow: 0 4px 12px rgba(0,0,0,0.4);
        }

        [data-theme="violet"] {
            --accent: #9b59b6;
            --accent-dim: #7d3c98;
        }
        [data-theme="sapphire"] {
            --accent: #2980b9;
            --accent-dim: #1a5276;
        }
        [data-theme="weatherlight"] {
            --accent: #f39c12;
            --accent-dim: #d68910;
            --bg: #1a1a2e;
            --bg-panel: #16213e;
            --bg-card: #1a1a3e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* Header */
        .header {
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header h1 {
            font-size: 1.2rem;
            color: var(--accent);
            white-space: nowrap;
        }
        .header h1 span {
            color: var(--text-dim);
            font-weight: 300;
        }
        .category-tabs {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            flex: 1;
        }
        .category-tab {
            padding: 6px 14px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .category-tab:hover {
            border-color: var(--accent);
            color: var(--text);
        }
        .category-tab.active {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
            font-weight: 600;
        }
        .search-box {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 6px 12px;
        }
        .search-box input {
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 0.9rem;
            outline: none;
            width: 140px;
        }
        .search-box input::placeholder { color: var(--text-dim); }

        /* Progress bar */
        .progress-bar-container {
            padding: 8px 24px;
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .progress-bar {
            flex: 1;
            height: 6px;
            background: var(--bg-card);
            border-radius: 3px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 3px;
            transition: width 0.4s ease;
        }
        .progress-text {
            font-size: 0.8rem;
            color: var(--text-dim);
            white-space: nowrap;
        }
        .quiz-score {
            font-size: 0.8rem;
            color: var(--accent);
            white-space: nowrap;
        }

        /* Main layout */
        .main-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        /* Service cards grid */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .service-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            user-select: none;
        }
        .service-card:hover {
            background: var(--bg-card-hover);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }
        .service-card.active {
            border-color: var(--card-color, var(--accent));
            box-shadow: 0 0 12px rgba(255,153,0,0.2);
        }
        .service-card.dragging {
            opacity: 0.5;
            transform: scale(0.95);
        }
        .service-card .card-icon {
            width: 40px;
            height: 40px;
            margin-bottom: 8px;
        }
        .service-card .card-icon svg {
            width: 100%;
            height: 100%;
        }
        .service-card .card-name {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-bright);
            margin-bottom: 4px;
        }
        .service-card .card-tagline {
            font-size: 0.75rem;
            color: var(--text-dim);
            line-height: 1.4;
        }
        .service-card .card-category-dot {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        .service-card .studied-check {
            position: absolute;
            bottom: 8px;
            right: 8px;
            color: var(--success);
            font-size: 0.8rem;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .service-card.studied .studied-check { opacity: 1; }

        /* Detail panel */
        .detail-panel {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 24px;
            overflow: hidden;
            max-height: 0;
            transition: max-height 0.4s ease, padding 0.4s ease;
        }
        .detail-panel.open {
            max-height: 2000px;
            padding: 24px;
        }
        .detail-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
        }
        .detail-header .detail-icon { width: 48px; height: 48px; }
        .detail-header .detail-icon svg { width: 100%; height: 100%; }
        .detail-header h2 {
            font-size: 1.5rem;
            color: var(--text-bright);
        }
        .detail-header h2 span {
            font-size: 1rem;
            color: var(--text-dim);
            font-weight: 300;
            margin-left: 8px;
        }
        .detail-tagline {
            font-style: italic;
            color: var(--text-dim);
            margin-bottom: 20px;
            font-size: 0.95rem;
        }
        .detail-body {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }
        .detail-section h3 {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent);
            margin-bottom: 10px;
        }
        .detail-section ul {
            list-style: none;
            padding: 0;
        }
        .detail-section ul li {
            padding: 4px 0;
            padding-left: 16px;
            position: relative;
            font-size: 0.9rem;
        }
        .detail-section ul li::before {
            content: "\2022";
            position: absolute;
            left: 0;
            color: var(--accent);
        }
        .exam-tips li::before { content: "\26A1" !important; }
        .connects-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .connects-chip {
            padding: 4px 10px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 0.8rem;
            color: var(--text);
            cursor: pointer;
            transition: all 0.2s;
        }
        .connects-chip:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* Quiz section */
        .quiz-section {
            grid-column: 1 / -1;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }
        .quiz-question {
            margin-bottom: 16px;
        }
        .quiz-question p {
            font-size: 0.95rem;
            margin-bottom: 10px;
            color: var(--text-bright);
        }
        .quiz-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .quiz-option {
            padding: 10px 14px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        .quiz-option:hover { border-color: var(--accent); }
        .quiz-option.correct {
            background: rgba(76, 175, 80, 0.2);
            border-color: var(--success);
            color: var(--success);
        }
        .quiz-option.incorrect {
            background: rgba(244, 67, 54, 0.2);
            border-color: var(--error);
            color: var(--error);
        }
        .quiz-option.disabled { pointer-events: none; opacity: 0.7; }
        .quiz-explanation {
            margin-top: 10px;
            padding: 10px;
            background: var(--bg-card);
            border-radius: var(--radius);
            font-size: 0.85rem;
            color: var(--text-dim);
            display: none;
        }
        .quiz-explanation.show { display: block; }

        /* Architecture Builder */
        .builder-section {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            margin-top: 24px;
        }
        .builder-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .builder-header h2 {
            font-size: 1.2rem;
            color: var(--text-bright);
        }
        .builder-controls {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .builder-btn {
            padding: 6px 14px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text);
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }
        .builder-btn:hover { border-color: var(--accent); color: var(--accent); }
        .builder-btn.primary {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
            font-weight: 600;
        }
        .builder-btn.primary:hover { background: var(--accent-dim); }

        .challenge-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .challenge-btn {
            padding: 6px 12px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text-dim);
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }
        .challenge-btn:hover { border-color: var(--accent); color: var(--text); }
        .challenge-btn.active { border-color: var(--accent); color: var(--accent); }
        .challenge-btn.completed { border-color: var(--success); color: var(--success); }

        .builder-canvas {
            width: 100%;
            height: 300px;
            background: var(--bg);
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            position: relative;
            overflow: hidden;
            transition: border-color 0.2s;
        }
        .builder-canvas.drag-over {
            border-color: var(--accent);
            background: rgba(255, 153, 0, 0.02);
        }
        .builder-canvas .drop-hint {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: var(--text-dim);
            font-size: 0.9rem;
            pointer-events: none;
        }
        .builder-node {
            position: absolute;
            width: 80px;
            height: 80px;
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: var(--radius);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: grab;
            transition: border-color 0.2s, box-shadow 0.2s;
            user-select: none;
            z-index: 10;
        }
        .builder-node:hover { border-color: var(--accent); }
        .builder-node.selected {
            border-color: var(--accent);
            box-shadow: 0 0 8px rgba(255, 153, 0, 0.4);
        }
        .builder-node.correct-node { border-color: var(--success); }
        .builder-node.incorrect-node { border-color: var(--error); }
        .builder-node svg { width: 28px; height: 28px; margin-bottom: 4px; }
        .builder-node span { font-size: 0.65rem; color: var(--text); text-align: center; }

        .builder-canvas svg.connections {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }
        .builder-canvas svg.connections line {
            stroke: var(--accent);
            stroke-width: 2;
            marker-end: url(#arrowhead);
        }

        .builder-result {
            margin-top: 12px;
            padding: 10px;
            border-radius: var(--radius);
            font-size: 0.9rem;
            display: none;
        }
        .builder-result.success {
            display: block;
            background: rgba(76, 175, 80, 0.15);
            border: 1px solid var(--success);
            color: var(--success);
        }
        .builder-result.failure {
            display: block;
            background: rgba(244, 67, 54, 0.15);
            border: 1px solid var(--error);
            color: var(--error);
        }

        /* Quiz All mode */
        .quiz-all-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(10, 10, 20, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .quiz-all-overlay.open { display: flex; }
        .quiz-all-panel {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 32px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        .quiz-all-panel h2 {
            color: var(--accent);
            margin-bottom: 8px;
        }
        .quiz-all-panel .quiz-progress {
            color: var(--text-dim);
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
        .quiz-all-panel .quiz-options { grid-template-columns: 1fr; }
        .quiz-all-next {
            margin-top: 16px;
            padding: 10px 20px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            font-weight: 600;
            display: none;
        }
        .quiz-all-next.show { display: inline-block; }

        /* Login overlay */
        .login-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(10, 10, 20, 0.97);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .login-overlay.open { display: flex; }
        .login-panel {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 40px;
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        .login-panel h2 { color: var(--accent); margin-bottom: 8px; }
        .login-panel p { color: var(--text-dim); margin-bottom: 24px; }
        .login-panel input {
            width: 100%;
            padding: 12px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-size: 1rem;
            margin-bottom: 16px;
            outline: none;
        }
        .login-panel input:focus { border-color: var(--accent); }
        .login-panel button {
            padding: 12px 32px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header { padding: 10px 16px; }
            .cards-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
            .detail-body { grid-template-columns: 1fr; }
            .quiz-options { grid-template-columns: 1fr; }
            .main-content { padding: 16px; }
            .builder-canvas { height: 250px; }
        }
    </style>
</head>
<body>
    <!-- Login Overlay -->
    <div class="login-overlay" id="loginOverlay">
        <div class="login-panel">
            <h2>AWS Lessons</h2>
            <p>Enter your token to continue</p>
            <input type="text" id="tokenInput" placeholder="vv-token">
            <br>
            <button onclick="doLogin()">Enter</button>
        </div>
    </div>

    <!-- Quiz All Overlay -->
    <div class="quiz-all-overlay" id="quizAllOverlay">
        <div class="quiz-all-panel" id="quizAllPanel">
            <h2>Quiz Mode</h2>
            <div class="quiz-progress" id="quizAllProgress"></div>
            <div id="quizAllContent"></div>
            <button class="quiz-all-next" id="quizAllNext" onclick="nextQuizQuestion()">Next</button>
            <button class="builder-btn" style="margin-top:12px" onclick="closeQuizAll()">Close</button>
        </div>
    </div>

    <!-- Header -->
    <header class="header">
        <h1>AWS LESSONS <span>Interactive</span></h1>
        <div class="category-tabs" id="categoryTabs"></div>
        <div class="search-box">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
            </svg>
            <input type="text" id="searchInput" placeholder="Search services...">
        </div>
        <button class="builder-btn" onclick="openQuizAll()">Quiz All</button>
    </header>

    <!-- Progress -->
    <div class="progress-bar-container">
        <span class="progress-text" id="progressText">0 / 0 studied</span>
        <div class="progress-bar"><div class="progress-bar-fill" id="progressFill"></div></div>
        <span class="quiz-score" id="quizScoreDisplay">Score: 0/0</span>
    </div>

    <!-- Main -->
    <main class="main-content">
        <div class="cards-grid" id="cardsGrid"></div>
        <div class="detail-panel" id="detailPanel"></div>

        <!-- Architecture Builder -->
        <div class="builder-section">
            <div class="builder-header">
                <h2>Architecture Builder</h2>
                <div class="builder-controls">
                    <button class="builder-btn" onclick="clearBuilder()">Clear</button>
                    <button class="builder-btn primary" onclick="checkArchitecture()">Check</button>
                </div>
            </div>
            <div class="challenge-selector" id="challengeSelector"></div>
            <div class="builder-canvas" id="builderCanvas">
                <svg class="connections" id="builderConnections">
                    <defs>
                        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                            <polygon points="0 0, 10 3.5, 0 7" fill="var(--accent)"/>
                        </marker>
                    </defs>
                </svg>
                <div class="drop-hint" id="dropHint">Drop services here to build architectures</div>
            </div>
            <div class="builder-result" id="builderResult"></div>
        </div>
    </main>

    <script>
    // ===== State =====
    let allServices = [];
    let categories = {};
    let activeCategory = null;
    let selectedService = null;
    let progress = JSON.parse(localStorage.getItem('vv-lessons-progress') || '{}');
    let quizScores = JSON.parse(localStorage.getItem('vv-lessons-scores') || '{"correct":0,"total":0}');

    // Builder state
    let builderNodes = [];
    let builderConnections = [];
    let connectingFrom = null;
    let selectedBuilderNode = null;
    let draggedNode = null;
    let dragOffset = { x: 0, y: 0 };
    let activeChallenge = null;

    // Quiz All state
    let quizAllQuestions = [];
    let quizAllIndex = 0;
    let quizAllScore = { correct: 0, total: 0 };

    const challenges = [
        {
            id: 'three-tier',
            name: '3-Tier Web App',
            description: 'Route53 -> ELB -> EC2 -> RDS',
            required: ['route53', 'elb', 'ec2', 'rds'],
            connections: [['route53','elb'],['elb','ec2'],['ec2','rds']]
        },
        {
            id: 'serverless-api',
            name: 'Serverless API',
            description: 'API Gateway -> Lambda -> DynamoDB',
            required: ['apigateway', 'lambda', 'dynamodb'],
            connections: [['apigateway','lambda'],['lambda','dynamodb']]
        },
        {
            id: 'static-site',
            name: 'Static Website',
            description: 'S3 -> CloudFront -> Route53',
            required: ['s3', 'cloudfront', 'route53'],
            connections: [['route53','cloudfront'],['cloudfront','s3']]
        },
        {
            id: 'data-pipeline',
            name: 'Data Pipeline',
            description: 'SQS -> Lambda -> S3 -> Redshift',
            required: ['sqs', 'lambda', 's3', 'redshift'],
            connections: [['sqs','lambda'],['lambda','s3'],['s3','redshift']]
        }
    ];

    // ===== SVG Icons =====
    const icons = {
        server: `<svg viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="2"><rect x="8" y="6" width="24" height="10" rx="2"/><rect x="8" y="22" width="24" height="10" rx="2"/><circle cx="12" cy="11" r="1.5" fill="currentColor"/><circle cx="12" cy="27" r="1.5" fill="currentColor"/><line x1="17" y1="11" x2="28" y2="11"/><line x1="17" y1="27" x2="28" y2="27"/></svg>`,

    function getIcon(iconName, color) {
        const svg = icons[iconName] || icons.server;
        return svg.replace(/currentColor/g, color || 'var(--text)');
    }

    // ===== Theme =====
    function applyTheme() {
        const params = new URLSearchParams(window.location.search);
        const theme = params.get('theme');
        if (theme) document.body.setAttribute('data-theme', theme);
        const brand = params.get('brand');
        if (brand) document.title = `${brand} — AWS Lessons`;
    }

    // ===== Auth =====
    function checkAuth() {
        const token = localStorage.getItem('vv-token');
        if (!token) {
            document.getElementById('loginOverlay').classList.add('open');
        }
    }

    function doLogin() {
        const token = document.getElementById('tokenInput').value.trim();
        if (token) {
            localStorage.setItem('vv-token', token);
            document.getElementById('loginOverlay').classList.remove('open');
        }
    }

    // ===== Data Loading =====
    const categoryFiles = ['compute', 'storage', 'database', 'networking', 'security', 'serverless'];

    async function loadAllData() {
        const promises = categoryFiles.map(f =>
            fetch(`lessons/${f}.json`).then(r => r.json()).catch(() => null)
        );
        const results = await Promise.all(promises);
        results.forEach(data => {
            if (!data) return;
            categories[data.category] = data;
            data.services.forEach(s => {
                s._category = data.category;
                s._color = data.color;
                allServices.push(s);
            });
        });
        renderCategoryTabs();
        setActiveCategory(Object.keys(categories)[0]);
        renderChallenges();
        updateProgress();
    }

    // ===== Rendering =====
    function renderCategoryTabs() {
        const tabs = document.getElementById('categoryTabs');
        tabs.innerHTML = Object.keys(categories).map(cat =>
            `<button class="category-tab" data-cat="${cat}" onclick="setActiveCategory('${cat}')">${cat}</button>`
        ).join('');
    }

    function setActiveCategory(cat) {
        activeCategory = cat;
        document.querySelectorAll('.category-tab').forEach(t => {
            t.classList.toggle('active', t.dataset.cat === cat);
        });
        renderCards(categories[cat].services);
        closeDetail();
    }

    function renderCards(services) {
        const grid = document.getElementById('cardsGrid');
        grid.innerHTML = services.map(s => {
            const studied = progress[s.id] ? 'studied' : '';
            return `<div class="service-card ${studied}" data-id="${s.id}" style="--card-color:${s._color}"
                draggable="true" onclick="selectService('${s.id}')"
                ondragstart="onDragStart(event, '${s.id}')">
                <div class="card-category-dot" style="background:${s._color}"></div>
                <div class="card-icon">${getIcon(s.icon, s._color)}</div>
                <div class="card-name">${s.name}</div>
                <div class="card-tagline">${s.tagline}</div>
                <div class="studied-check">&#10003;</div>
            </div>`;
        }).join('');
    }

    function selectService(id) {
        const service = allServices.find(s => s.id === id);
        if (!service) return;

        // Handle lambda duplicate (serverless category)
        if (id === 'lambda-sl') {
            const lambdaMain = allServices.find(s => s.id === 'lambda');
            if (lambdaMain) {
                // Mark the serverless lambda as studied too
                markStudied('lambda-sl');
                // Show the main lambda content enriched with serverless-specific info
            }
        }

        selectedService = service;
        markStudied(id);
        renderDetail(service);

        document.querySelectorAll('.service-card').forEach(c => {
            c.classList.toggle('active', c.dataset.id === id);
        });
    }

    function markStudied(id) {
        if (!progress[id]) {
            progress[id] = { studied: true, timestamp: Date.now() };
            saveProgress();
            updateProgress();
            // update card visual
            const card = document.querySelector(`.service-card[data-id="${id}"]`);
            if (card) card.classList.add('studied');
        }
    }

    function renderDetail(service) {
        const panel = document.getElementById('detailPanel');
        const quizHtml = service.quiz ? service.quiz.map((q, qi) => `
            <div class="quiz-question" data-qi="${qi}">
                <p><strong>Q:</strong> ${q.q}</p>
                <div class="quiz-options">
                    ${q.options.map((opt, oi) => `
                        <div class="quiz-option" onclick="answerQuiz('${service.id}', ${qi}, ${oi})">${opt}</div>
                    `).join('')}
                </div>
                <div class="quiz-explanation" id="explanation-${service.id}-${qi}">${q.explanation}</div>
            </div>
        `).join('') : '';

        const connectsHtml = (service.connects || []).map(c => {
            const target = allServices.find(s => s.id === c);
            const name = target ? target.name : c;
            return `<span class="connects-chip" onclick="navigateToService('${c}')">${name}</span>`;
        }).join('');

        panel.innerHTML = `
            <div class="detail-header">
                <div class="detail-icon">${getIcon(service.icon, service._color)}</div>
                <h2>${service.name}<span>— ${service.fullName}</span></h2>
            </div>
            <div class="detail-tagline">"${service.tagline}"</div>
            <div class="detail-body">
                <div class="detail-section">
                    <h3>Key Points</h3>
                    <ul>${service.keyPoints.map(p => `<li>${p}</li>`).join('')}</ul>
                </div>
                <div class="detail-section">
                    <h3>Connects To</h3>
                    <div class="connects-list">${connectsHtml}</div>
                    <h3 style="margin-top:16px">Use Cases</h3>
                    <ul>${service.useCases.map(u => `<li>${u}</li>`).join('')}</ul>
                </div>
                <div class="detail-section exam-tips" style="grid-column:1/-1">
                    <h3>Exam Tips</h3>
                    <ul>${service.examTips.map(t => `<li>${t}</li>`).join('')}</ul>
                </div>
                ${quizHtml ? `<div class="quiz-section"><h3 style="color:var(--accent);margin-bottom:12px">Quick Quiz</h3>${quizHtml}</div>` : ''}
            </div>
        `;
        panel.classList.add('open');
    }

    function closeDetail() {
        document.getElementById('detailPanel').classList.remove('open');
        selectedService = null;
        document.querySelectorAll('.service-card').forEach(c => c.classList.remove('active'));
    }

    function navigateToService(id) {
        const service = allServices.find(s => s.id === id);
        if (!service) return;
        // Switch category if needed
        if (service._category !== activeCategory) {
            setActiveCategory(service._category);
        }
        selectService(id);
        // Scroll to detail
        document.getElementById('detailPanel').scrollIntoView({ behavior: 'smooth' });
    }

    // ===== Quiz =====
    function answerQuiz(serviceId, qi, selected) {
        const service = allServices.find(s => s.id === serviceId);
        const q = service.quiz[qi];
        const container = document.querySelectorAll(`.quiz-question[data-qi="${qi}"]`);
        const questionEl = container[container.length - 1]; // Handle quiz-all
        if (!questionEl) return;

        const options = questionEl.querySelectorAll('.quiz-option');
        options.forEach((opt, i) => {
            opt.classList.add('disabled');
            if (i === q.answer) opt.classList.add('correct');
            if (i === selected && i !== q.answer) opt.classList.add('incorrect');
        });

        const explanation = questionEl.querySelector('.quiz-explanation') ||
            document.getElementById(`explanation-${serviceId}-${qi}`);
        if (explanation) explanation.classList.add('show');

        quizScores.total++;
        if (selected === q.answer) quizScores.correct++;
        saveScores();
        updateProgress();
    }

    // ===== Quiz All Mode =====
    function openQuizAll() {
        quizAllQuestions = [];
        allServices.forEach(s => {
            if (s.quiz) {
                s.quiz.forEach((q, qi) => {
                    quizAllQuestions.push({ service: s, question: q, qi });
                });
            }
        });
        // Shuffle
        for (let i = quizAllQuestions.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [quizAllQuestions[i], quizAllQuestions[j]] = [quizAllQuestions[j], quizAllQuestions[i]];
        }
        quizAllIndex = 0;
        quizAllScore = { correct: 0, total: 0 };
        renderQuizAllQuestion();
        document.getElementById('quizAllOverlay').classList.add('open');
    }

    function renderQuizAllQuestion() {
        if (quizAllIndex >= quizAllQuestions.length) {
            document.getElementById('quizAllContent').innerHTML = `
                <p style="font-size:1.2rem;color:var(--text-bright)">Complete!</p>
                <p>Score: ${quizAllScore.correct} / ${quizAllScore.total}</p>
            `;
            document.getElementById('quizAllNext').classList.remove('show');
            document.getElementById('quizAllProgress').textContent = 'All questions answered!';
            return;
        }
        const { service, question, qi } = quizAllQuestions[quizAllIndex];
        document.getElementById('quizAllProgress').textContent =
            `Question ${quizAllIndex + 1} of ${quizAllQuestions.length} | Score: ${quizAllScore.correct}/${quizAllScore.total} | ${service.name}`;
        document.getElementById('quizAllContent').innerHTML = `
            <div class="quiz-question" data-qi="${qi}">
                <p><strong>Q:</strong> ${question.q}</p>
                <div class="quiz-options">
                    ${question.options.map((opt, oi) => `
                        <div class="quiz-option" onclick="answerQuizAll(${oi})">${opt}</div>
                    `).join('')}
                </div>
                <div class="quiz-explanation">${question.explanation}</div>
            </div>
        `;
        document.getElementById('quizAllNext').classList.remove('show');
    }

    function answerQuizAll(selected) {
        const { question } = quizAllQuestions[quizAllIndex];
        const questionEl = document.querySelector('#quizAllContent .quiz-question');
        const options = questionEl.querySelectorAll('.quiz-option');
        options.forEach((opt, i) => {
            opt.classList.add('disabled');
            if (i === question.answer) opt.classList.add('correct');
            if (i === selected && i !== question.answer) opt.classList.add('incorrect');
        });
        questionEl.querySelector('.quiz-explanation').classList.add('show');
        quizAllScore.total++;
        quizScores.total++;
        if (selected === question.answer) {
            quizAllScore.correct++;
            quizScores.correct++;
        }
        saveScores();
        updateProgress();
        document.getElementById('quizAllNext').classList.add('show');
    }

    function nextQuizQuestion() {
        quizAllIndex++;
        renderQuizAllQuestion();
    }

    function closeQuizAll() {
        document.getElementById('quizAllOverlay').classList.remove('open');
    }

    // ===== Search =====
    document.getElementById('searchInput').addEventListener('input', function(e) {
        const query = e.target.value.toLowerCase().trim();
        if (!query) {
            if (activeCategory) renderCards(categories[activeCategory].services);
            return;
        }
        const results = allServices.filter(s =>
            s.name.toLowerCase().includes(query) ||
            s.fullName.toLowerCase().includes(query) ||
            s.tagline.toLowerCase().includes(query) ||
            s.description.toLowerCase().includes(query) ||
            (s.useCases && s.useCases.some(u => u.toLowerCase().includes(query)))
        );
        renderCards(results);
        // Deactivate category tabs
        document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
    });

    // ===== Progress =====
    function updateProgress() {
        const total = allServices.length;
        const studied = Object.keys(progress).length;
        const pct = total > 0 ? (studied / total * 100) : 0;
        document.getElementById('progressFill').style.width = `${pct}%`;
        document.getElementById('progressText').textContent = `${studied} / ${total} studied`;
        document.getElementById('quizScoreDisplay').textContent = `Score: ${quizScores.correct}/${quizScores.total}`;
    }

    function saveProgress() {
        localStorage.setItem('vv-lessons-progress', JSON.stringify(progress));
    }
    function saveScores() {
        localStorage.setItem('vv-lessons-scores', JSON.stringify(quizScores));
    }

    // ===== Architecture Builder =====
    function renderChallenges() {
        const sel = document.getElementById('challengeSelector');
        sel.innerHTML = challenges.map(c => {
            const completed = localStorage.getItem(`vv-challenge-${c.id}`) ? 'completed' : '';
            return `<button class="challenge-btn ${completed}" data-id="${c.id}" onclick="selectChallenge('${c.id}')">${c.name}</button>`;
        }).join('');
    }

    function selectChallenge(id) {
        activeChallenge = challenges.find(c => c.id === id);
        document.querySelectorAll('.challenge-btn').forEach(b => {
            b.classList.toggle('active', b.dataset.id === id);
        });
        clearBuilder();
        document.getElementById('dropHint').textContent =
            `Challenge: ${activeChallenge.description}`;
    }

    function onDragStart(e, serviceId) {
        e.dataTransfer.setData('text/plain', serviceId);
        e.target.classList.add('dragging');
        setTimeout(() => e.target.classList.remove('dragging'), 100);
    }

    const canvas = document.getElementById('builderCanvas');
    canvas.addEventListener('dragover', e => {
        e.preventDefault();
        canvas.classList.add('drag-over');
    });
    canvas.addEventListener('dragleave', () => {
        canvas.classList.remove('drag-over');
    });
    canvas.addEventListener('drop', e => {
        e.preventDefault();
        canvas.classList.remove('drag-over');
        const serviceId = e.dataTransfer.getData('text/plain');
        if (!serviceId) return;
        const service = allServices.find(s => s.id === serviceId);
        if (!service) return;
        // Don't add duplicates
        if (builderNodes.find(n => n.id === serviceId)) return;

        const rect = canvas.getBoundingClientRect();
        const x = Math.max(0, Math.min(e.clientX - rect.left - 40, rect.width - 80));
        const y = Math.max(0, Math.min(e.clientY - rect.top - 40, rect.height - 80));

        builderNodes.push({ id: serviceId, x, y, service });
        renderBuilderNodes();
        document.getElementById('dropHint').style.display = 'none';
    });

    function renderBuilderNodes() {
        // Remove existing nodes
        canvas.querySelectorAll('.builder-node').forEach(n => n.remove());

        builderNodes.forEach(node => {
            const el = document.createElement('div');
            el.className = 'builder-node';
            if (selectedBuilderNode === node.id) el.classList.add('selected');
            el.style.left = node.x + 'px';
            el.style.top = node.y + 'px';
            el.dataset.id = node.id;
            el.innerHTML = `${getIcon(node.service.icon, node.service._color)}<span>${node.service.name}</span>`;

            // Click to connect
            el.addEventListener('click', (e) => {
                e.stopPropagation();
                if (connectingFrom === null) {
                    connectingFrom = node.id;
                    selectedBuilderNode = node.id;
                } else if (connectingFrom !== node.id) {
                    // Create connection
                    if (!builderConnections.find(c => c[0] === connectingFrom && c[1] === node.id)) {
                        builderConnections.push([connectingFrom, node.id]);
                    }
                    connectingFrom = null;
                    selectedBuilderNode = null;
                } else {
                    connectingFrom = null;
                    selectedBuilderNode = null;
                }
                renderBuilderNodes();
                renderBuilderConnections();
            });

            // Drag to reposition
            el.addEventListener('mousedown', (e) => {
                if (e.button !== 0) return;
                draggedNode = node;
                dragOffset = { x: e.offsetX, y: e.offsetY };
                el.style.cursor = 'grabbing';
            });

            canvas.appendChild(el);
        });
    }

    document.addEventListener('mousemove', (e) => {
        if (!draggedNode) return;
        const rect = canvas.getBoundingClientRect();
        const x = Math.max(0, Math.min(e.clientX - rect.left - dragOffset.x, rect.width - 80));
        const y = Math.max(0, Math.min(e.clientY - rect.top - dragOffset.y, rect.height - 80));
        draggedNode.x = x;
        draggedNode.y = y;
        const el = canvas.querySelector(`.builder-node[data-id="${draggedNode.id}"]`);
        if (el) {
            el.style.left = x + 'px';
            el.style.top = y + 'px';
        }
        renderBuilderConnections();
    });

    document.addEventListener('mouseup', () => {
        draggedNode = null;
    });

    function renderBuilderConnections() {
        const svg = document.getElementById('builderConnections');
        // Remove old lines
        svg.querySelectorAll('line').forEach(l => l.remove());
        builderConnections.forEach(([fromId, toId]) => {
            const from = builderNodes.find(n => n.id === fromId);
            const to = builderNodes.find(n => n.id === toId);
            if (!from || !to) return;
            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            line.setAttribute('x1', from.x + 40);
            line.setAttribute('y1', from.y + 40);
            line.setAttribute('x2', to.x + 40);
            line.setAttribute('y2', to.y + 40);
            svg.appendChild(line);
        });
    }

    function clearBuilder() {
        builderNodes = [];
        builderConnections = [];
        connectingFrom = null;
        selectedBuilderNode = null;
        canvas.querySelectorAll('.builder-node').forEach(n => n.remove());
        document.getElementById('builderConnections').querySelectorAll('line').forEach(l => l.remove());
        document.getElementById('dropHint').style.display = 'block';
        document.getElementById('dropHint').textContent = activeChallenge
            ? `Challenge: ${activeChallenge.description}`
            : 'Drop services here to build architectures';
        hideBuilderResult();
    }

    function checkArchitecture() {
        if (!activeChallenge) {
            showBuilderResult('Select a challenge first!', false);
            return;
        }
        const nodeIds = builderNodes.map(n => n.id);
        const connSet = new Set(builderConnections.map(c => c.join('->')));

        // Check all required services present
        // Handle lambda vs lambda-sl
        const normalizeId = (id) => id === 'lambda-sl' ? 'lambda' : id;
        const normalizedNodeIds = nodeIds.map(normalizeId);

        const missingServices = activeChallenge.required.filter(r => !normalizedNodeIds.includes(r));
        const missingConnections = activeChallenge.connections.filter(([from, to]) => {
            // Check both original and normalized
            return !builderConnections.some(([f, t]) =>
                (normalizeId(f) === from && normalizeId(t) === to)
            );
        });

        // Visual feedback on nodes
        canvas.querySelectorAll('.builder-node').forEach(el => {
            const nId = normalizeId(el.dataset.id);
            if (activeChallenge.required.includes(nId)) {
                el.classList.add('correct-node');
            } else {
                el.classList.add('incorrect-node');
            }
        });

        if (missingServices.length === 0 && missingConnections.length === 0) {
            showBuilderResult('Correct! Architecture matches the expected pattern.', true);
            localStorage.setItem(`vv-challenge-${activeChallenge.id}`, 'true');
            renderChallenges();
        } else {
            let msg = 'Not quite. ';
            if (missingServices.length > 0) msg += `Missing services: ${missingServices.join(', ')}. `;
            if (missingConnections.length > 0) msg += `Missing connections: ${missingConnections.map(c => c.join(' -> ')).join(', ')}.`;
            showBuilderResult(msg, false);
        }
    }

    function showBuilderResult(msg, success) {
        const el = document.getElementById('builderResult');
        el.textContent = msg;
        el.className = 'builder-result ' + (success ? 'success' : 'failure');
    }

    function hideBuilderResult() {
        const el = document.getElementById('builderResult');
        el.className = 'builder-result';
    }

    // ===== Init =====
    applyTheme();
    checkAuth();
    loadAllData();

    // Handle token input enter key
    document.getElementById('tokenInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') doLogin();
    });
    </script>
</body>
</html>
